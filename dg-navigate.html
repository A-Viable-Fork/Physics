otential (Section 4.4) forces the bare VEV to be vastly trans-Planckian: v ~ M_P * S_dS / (Y_MM M_P) ~ 10^139 GeV under standard EFT scaling Y_MM ~ M_P^-1. The 4D Planck mass is generated through M_P^2 = 32 Y_MM v m^2 (Addazi-Meluccio eq. 4) rather than identified with the bare VEV. This trans-Planckian hierarchy provides geometric suppression of all aperiodic radiative corrections to the periodic potential: the field-space distance between adjacent topological vacua remains Delta rho ~ 1/(c Y_MM) ~ 10^19 GeV (Planck-scale), and the topological barrier height V_barrier ~ mu_rho^2 Delta rho^2 ~ 10^32 GeV^4 at MeV radion mass overwhelmingly dominates aperiodic Coleman-Weinberg slopes (~10^-3 GeV^3 at the cell boundary) by 16 orders of magnitude. The protection mechanism is kinematic, overwhelming barrier height, rather than symmetric: the discrete shift symmetry is broken by the framework's gamma(phi^2) F_Q coupling and is not protective. Reference: Gemini CC Radiative Stability Report (April 2026), Addazi-Meluccio 2026. Constrains: F20, F-CC, Tier 4 SSB potential structure. Constrained by: T3.6.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":["t3.6"],"role":"DG kind: derivation","takes":["t3.6"],"produces":["k18"],"composition":"none","function":"derive","math":"K18: Trans-Planckian VEV Suppresses Aperiodic Tilts [v4.8, from T3.6 + Tier 4 Section 4.4 reformulation]. Adoption of the Addazi-Meluccio periodic SSB potential (Section 4.4) forces the bare VEV to be vastly trans-Planckian: v ~ M_P * S_dS / (Y_MM M_P) ~ 10^139 GeV under standard EFT scaling Y_MM ~ M_P^-1. The 4D Planck mass is generated through M_P^2 = 32 Y_MM v m^2 (Addazi-Meluccio eq. 4) rather than identified with the bare VEV. This trans-Planckian hierarchy provides geometric suppression of all aperiodic radiative corrections to the periodic potential: the field-space distance between adjacent topological vacua remains Delta rho ~ 1/(c Y_MM) ~ 10^19 GeV (Planck-scale), and the topological barrier height V_barrier ~ mu_rho^2 Delta rho^2 ~ 10^32 GeV^4 at MeV radion mass overwhelmingly dominates aperiodic Coleman-Weinberg slopes (~10^-3 GeV^3 at the cell boundary) by 16 orders of magnitude. The protection mechanism is kinematic, overwhelming barrier height, rather than symmetric: the discrete shift symmetry is broken by the framework's gamma(phi^2) F_Q coupling and is not protective. Reference: Gemini CC Radiative Stability Report (April 2026), Addazi-Meluccio 2026. Constrains: F20, F-CC, Tier 4 SSB potential structure. Constrained by: T3.6.","formal_status":"nl","load_bearing":true},"gut-box-occupant":{"id":"gut-box-occupant","kind":"question","label":"GUT Box occupant (v4.0): the GUT Box, previously an empty search space bounded by K","statement":"GUT Box occupant (v4.0): the GUT Box, previously an empty search space bounded by K10, K11, K12, acquires its first confirmed occupant: F-theory X_F13 Pati-Salam on B_3 = P(O_dP3 (+) O(-H)) -> dP_3. A systematic survey (GUT Box Population Survey v1.7, seven adversarial Shore cycles, ten architectures evaluated) identified one confirmed viable resident: three killed (minimal SU(5), SUSY SU(5), orbifold GUTs), three flagged (SO(10), flipped SU(5), semi-simple/quiver), three plausible (trinification, E6, SUSY SO(10)), one confirmed viable (Pati-Salam). Three realization pathways were investigated for Pati-Salam in the Dark Dimension: intersecting D6-branes on factorizable tori (blocked by SF-G1, BPS-Chirality Tension), magnetized D-branes with Landau gapping (killed parametrically by SF-G3), and F-theory 7-branes on fibered bases (successful via SF-G2, Divisor Transversality). F-theory is the sole surviving realization pathway. The confirmed model passes all eight S-G20 constraints: gauge group, three families, Dark Dimension localization, tadpole, SUSY, proton decay, neutrino mass structure, rank-3 Yukawa.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"question","data":{}},"children":[],"explain":{"hook":"GUT Box occupant (v4.0): the GUT Box, previously an empty search space bounded by K10, K11, K12, acq...","intuition":"the toric fiber landscape of the F-theory GUT Box construction","in_words":"compute fiber-specific Euler characteristics chi(Y_4) and matter curve classes for the seven indeterminate toric fibers (X_F5, X_F6, X_F8, X_F9, X_F10, X_F11, X_F16) on each of the three surviving del Pezzo bases, 21 fiber-base pairs total, via FTheoryTools (Julia/OSCAR, arXiv:2506.13849), which implements the Batyrev-Borisov machinery; weeks-scale with software, intractable by hand"},"closing_condition":{"condition_kind":"proof","target":"compute fiber-specific Euler characteristics chi(Y_4) and matter curve classes for the seven indeterminate toric fibers (X_F5, X_F6, X_F8, X_F9, X_F10, X_F11, X_F16) on each of the three surviving del Pezzo bases, 21 fiber-base pairs total, via FTheoryTools (Julia/OSCAR, arXiv:2506.13849), which implements the Batyrev-Borisov machinery; weeks-scale with software, intractable by hand","system":"the toric fiber landscape of the F-theory GUT Box construction"}},"sf-g1":{"id":"sf-g1","kind":"transformation","label":"SF-G1: BPS-Chirality Tension on Factorizable Tori in the Dark Dimension","statement":"SF-G1: BPS-Chirality Tension on Factorizable Tori in the Dark Dimension. On factorizable T^6/(Z_2 x Z_2') orientifolds with standard N=1 BPS conditions, the requirements of Dark Dimension brane localization (all observable brane stacks trivially wrapped on the large torus), three chiral generations (nonzero per-torus intersection numbers), and supersymmetry (brane angle sum equal to zero with positive-definite complex structure moduli) admit no simultaneous solution. The Pigeonhole argument establishes that three stacks with only two allowed orientations on the large torus force at least one pair into parallel alignment, zeroing their intersection number. Demonstrated on all 33 Sabir et al. (2024) intersecting D6-brane models via exhaustive permutation analysis. Scope: blocks D6-brane factorizable torus constructions for any gauge group in the Dark Dimension. Non-factorizable Calabi-Yau compactifications, magnetized brane constructions, and F-theory 7-brane models remain open. Source: Torus Permutation Check report.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-g1"],"composition":"none","function":"derive","math":"SF-G1: BPS-Chirality Tension on Factorizable Tori in the Dark Dimension. On factorizable T^6/(Z_2 x Z_2') orientifolds with standard N=1 BPS conditions, the requirements of Dark Dimension brane localization (all observable brane stacks trivially wrapped on the large torus), three chiral generations (nonzero per-torus intersection numbers), and supersymmetry (brane angle sum equal to zero with positive-definite complex structure moduli) admit no simultaneous solution. The Pigeonhole argument establishes that three stacks with only two allowed orientations on the large torus force at least one pair into parallel alignment, zeroing their intersection number. Demonstrated on all 33 Sabir et al. (2024) intersecting D6-brane models via exhaustive permutation analysis. Scope: blocks D6-brane factorizable torus constructions for any gauge group in the Dark Dimension. Non-factorizable Calabi-Yau compactifications, magnetized brane constructions, and F-theory 7-brane models remain open. Source: Torus Permutation Check report.","formal_status":"nl","load_bearing":true},"sf-g2":{"id":"sf-g2","kind":"transformation","label":"SF-G2: Divisor Transversality Escape from BPS-Chirality Tension","statement":"SF-G2: Divisor Transversality Escape from BPS-Chirality Tension. F-theory gauge localization via horizontal divisors on P^1-fibered base threefolds provides a structural escape from SF-G1. The gauge divisor S_GUT is engineered as a horizontal section of the P^1 fibration, transverse to the macroscopic Dark Dimension fiber. The mechanism operates because: holomorphic divisors in F-theory enforce N=1 SUSY via holomorphicity of the divisor, a condition that does not couple fiber and base directions; the gauge KK tower is determined by the Laplacian on S_GUT, independent of the fiber volume; matter curves are geometrically contained within S_GUT; gauge couplings depend only on Vol(S_GUT), decoupled from Vol(P^1 fiber) at tree level with K14-suppressed one-loop corrections. Sen limit check confirms the BPS-Chirality Tension does not reappear in the Type IIB weak-coupling limit. Scope: applies to any F-theory construction where the GUT divisor can be placed on a horizontal section of a fibered base. The finding is independent of fiber type or gauge group. This is the mechanism by which the GUT Box is occupied. Source: F-Theory X_F13 Base Geometry Adaptation report.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-g2"],"composition":"none","function":"derive","math":"SF-G2: Divisor Transversality Escape from BPS-Chirality Tension. F-theory gauge localization via horizontal divisors on P^1-fibered base threefolds provides a structural escape from SF-G1. The gauge divisor S_GUT is engineered as a horizontal section of the P^1 fibration, transverse to the macroscopic Dark Dimension fiber. The mechanism operates because: holomorphic divisors in F-theory enforce N=1 SUSY via holomorphicity of the divisor, a condition that does not couple fiber and base directions; the gauge KK tower is determined by the Laplacian on S_GUT, independent of the fiber volume; matter curves are geometrically contained within S_GUT; gauge couplings depend only on Vol(S_GUT), decoupled from Vol(P^1 fiber) at tree level with K14-suppressed one-loop corrections. Sen limit check confirms the BPS-Chirality Tension does not reappear in the Type IIB weak-coupling limit. Scope: applies to any F-theory construction where the GUT divisor can be placed on a horizontal section of a fibered base. The finding is independent of fiber type or gauge group. This is the mechanism by which the GUT Box is occupied. Source: F-Theory X_F13 Base Geometry Adaptation report.","formal_status":"nl","load_bearing":true},"sf-g3":{"id":"sf-g3","kind":"transformation","label":"SF-G3: Avenue B Parametric Kill (Magnetized Brane Landau Gapping)","statement":"SF-G3: Avenue B Parametric Kill (Magnetized Brane Landau Gapping). The magnetized D-brane Landau gapping mechanism is parametrically unable to achieve Dark Dimension gauge localization on T^6/(Z_2 x Z_2') orientifolds. Closed-form bound: m_LL^max = M_s * sqrt(Q_max/(2 pi N_c A M_s^2)) ~ 710 MeV for Dark Dimension parameters, below the required 1 TeV threshold. The obstruction is an irreconcilable conflict between kinematics (mass gap scales linearly with flux N) and topology (induced RR charge scales linearly with N, bounded by the fixed orientifold budget Q_max ~ 32). Required flux N ~ 3.2e7 induces charge Q ~ 6.4e7 against a budget of 32; the deficit factor is ~ 2e6. Scope: parametric, applies to any magnetized D-brane model on any factorizable torus orientifold in the Dark Dimension. This eliminates an entire class of potential GUT realizations. Source: Avenue B Flux/Tadpole Budget report.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-g3"],"composition":"none","function":"derive","math":"SF-G3: Avenue B Parametric Kill (Magnetized Brane Landau Gapping). The magnetized D-brane Landau gapping mechanism is parametrically unable to achieve Dark Dimension gauge localization on T^6/(Z_2 x Z_2') orientifolds. Closed-form bound: m_LL^max = M_s * sqrt(Q_max/(2 pi N_c A M_s^2)) ~ 710 MeV for Dark Dimension parameters, below the required 1 TeV threshold. The obstruction is an irreconcilable conflict between kinematics (mass gap scales linearly with flux N) and topology (induced RR charge scales linearly with N, bounded by the fixed orientifold budget Q_max ~ 32). Required flux N ~ 3.2e7 induces charge Q ~ 6.4e7 against a budget of 32; the deficit factor is ~ 2e6. Scope: parametric, applies to any magnetized D-brane model on any factorizable torus orientifold in the Dark Dimension. This eliminates an entire class of potential GUT realizations. Source: Avenue B Flux/Tadpole Budget report.","formal_status":"nl","load_bearing":true},"sf-d0":{"id":"sf-d0","kind":"transformation","label":"SF-D0: Species-Enhanced One-Loop Coefficients in Brane Heat Kernels","statement":"SF-D0: Species-Enhanced One-Loop Coefficients in Brane Heat Kernels. When a bulk Kaluza-Klein tower of N_species fields runs in a one-loop effective action on a brane worldvolume, the local operator coefficients generated by the a_4 Seeley-DeWitt expansion inherit a polynomial N_species enhancement. This is a UV enhancement of the Wilsonian coefficient through additive spectral summation, distinct from thermodynamic O(N) FDT-constrained enhancement of the matter observable. The enhancement applies specifically to dimension-6 and higher operators whose coefficients are generated locally by the a_4 or higher-order heat kernel terms. The enhancement applies to local Wilsonian coefficients in the effective action, to diagonal spectral traces of the form Tr e^(-s Delta), and to operator coefficients at coincidence limits x -> y. The enhancement does not apply to operator evaluations subject to FDT, which remain O(N), to coherent scattering amplitudes with external KK states, which carry sum rules that can produce cancellations, or to propagators between separated points, governed by Sturm-Liouville orthogonality of the KK wavefunctions. This structural finding generalizes beyond the specific (phi^2) f_Q operator: any framework with bulk KK towers generating brane-localized effective operators should check whether the species enhancement applies to the specific operator coefficient under consideration. The operational test: identify whether the object being summed is a spectral trace, enhanced, or a coherent amplitude, cancellation-prone. This distinction underlies LINT-12. Applied to gamma, SF-D0 yields gamma = c_KK/(128 pi^2 Lambda_s^2), replacing the prior gamma ~ 1/(16 pi^2 M_Pl^2) estimate and resolving OP-0 unconditionally. Scope: applies to any braneworld construction with a bulk KK tower and brane-localized heat kernel effective action. Source: Georgi-Grant-Hailu (2001), von Gersdorff-Irges-Quiros (2002), Fabinger-Horava (2000), Adjudication Document (April 2026), Paper 0 v10 Section IV.D.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-d0"],"composition":"none","function":"derive","math":"SF-D0: Species-Enhanced One-Loop Coefficients in Brane Heat Kernels. When a bulk Kaluza-Klein tower of N_species fields runs in a one-loop effective action on a brane worldvolume, the local operator coefficients generated by the a_4 Seeley-DeWitt expansion inherit a polynomial N_species enhancement. This is a UV enhancement of the Wilsonian coefficient through additive spectral summation, distinct from thermodynamic O(N) FDT-constrained enhancement of the matter observable. The enhancement applies specifically to dimension-6 and higher operators whose coefficients are generated locally by the a_4 or higher-order heat kernel terms. The enhancement applies to local Wilsonian coefficients in the effective action, to diagonal spectral traces of the form Tr e^(-s Delta), and to operator coefficients at coincidence limits x -> y. The enhancement does not apply to operator evaluations subject to FDT, which remain O(N), to coherent scattering amplitudes with external KK states, which carry sum rules that can produce cancellations, or to propagators between separated points, governed by Sturm-Liouville orthogonality of the KK wavefunctions. This structural finding generalizes beyond the specific (phi^2) f_Q operator: any framework with bulk KK towers generating brane-localized effective operators should check whether the species enhancement applies to the specific operator coefficient under consideration. The operational test: identify whether the object being summed is a spectral trace, enhanced, or a coherent amplitude, cancellation-prone. This distinction underlies LINT-12. Applied to gamma, SF-D0 yields gamma = c_KK/(128 pi^2 Lambda_s^2), replacing the prior gamma ~ 1/(16 pi^2 M_Pl^2) estimate and resolving OP-0 unconditionally. Scope: applies to any braneworld construction with a bulk KK tower and brane-localized heat kernel effective action. Source: Georgi-Grant-Hailu (2001), von Gersdorff-Irges-Quiros (2002), Fabinger-Horava (2000), Adjudication Document (April 2026), Paper 0 v10 Section IV.D.","formal_status":"nl","load_bearing":true},"sf-d1":{"id":"sf-d1","kind":"transformation","label":"SF-D1: Even-Degree Parity Kill","statement":"SF-D1: Even-Degree Parity Kill. The geometric tadpole budget for X_F13 over any dP_n base evaluates to N_geom = (6132 - 228n)/24 = 255.5 - 9.5n. For even blow-up index n = 2k, this expression reduces to 255.5 - 19k, a strict half-integer. The flux penalty (1/2) Integral G_4 wedge G_4 for integer flux satisfying the three-family Diophantine lock (a = 3, sum b_i = 15) evaluates to an even integer (2 |F|^2, with |F|^2 = 9 - sum b_i^2 an integer). The difference between a half-integer budget and an even-integer penalty is inescapably half-integer: N_D3 is not an integer. This absolute algebraic parity contradiction eliminates dP_2, dP_4, dP_6, and dP_8 unconditionally under the X_F13 architecture with L = O(-H) twist. Half-integer flux shifts that could in principle restore parity shatter the a = 3 Diophantine lock required for three chiral families. Scope: applies to X_F13 on all even-degree del Pezzo surfaces under the standard twist; parity behavior under other fibers remains indeterminate. Source: Del Pezzo Exclusion Sweep report.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-d1"],"composition":"none","function":"derive","math":"SF-D1: Even-Degree Parity Kill. The geometric tadpole budget for X_F13 over any dP_n base evaluates to N_geom = (6132 - 228n)/24 = 255.5 - 9.5n. For even blow-up index n = 2k, this expression reduces to 255.5 - 19k, a strict half-integer. The flux penalty (1/2) Integral G_4 wedge G_4 for integer flux satisfying the three-family Diophantine lock (a = 3, sum b_i = 15) evaluates to an even integer (2 |F|^2, with |F|^2 = 9 - sum b_i^2 an integer). The difference between a half-integer budget and an even-integer penalty is inescapably half-integer: N_D3 is not an integer. This absolute algebraic parity contradiction eliminates dP_2, dP_4, dP_6, and dP_8 unconditionally under the X_F13 architecture with L = O(-H) twist. Half-integer flux shifts that could in principle restore parity shatter the a = 3 Diophantine lock required for three chiral families. Scope: applies to X_F13 on all even-degree del Pezzo surfaces under the standard twist; parity behavior under other fibers remains indeterminate. Source: Del Pezzo Exclusion Sweep report.","formal_status":"nl","load_bearing":true},"sf-d2":{"id":"sf-d2","kind":"transformation","label":"SF-D2: Gauge Group Fiber-Locking","statement":"SF-D2: Gauge Group Fiber-Locking. The Pati-Salam gauge symmetry (SU(4) x SU(2)_L x SU(2)_R)/Z_2 is determined entirely by the X_F13 toric fiber and is invariant under variation of the base surface within the surviving family {dP_3, dP_5, dP_7}. The base geometry affects the chiral spectrum details, flux distribution, tadpole margin, Yukawa multiplicity, moduli stabilization landscape, but leaves the gauge group unchanged. The derivation chain for gauge group selection is: framework constraints (K10, K11, K12) leads to Dark Dimension boundary conditions (SF-G2 divisor transversality) leads to X_F13 fiber selection leads to Pati-Salam. The base choice is a secondary vacuum selection problem within a three-element discrete landscape. Source: Del Pezzo Exclusion Sweep report, Fiber Exclusion Sweep report.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-d2"],"composition":"none","function":"derive","math":"SF-D2: Gauge Group Fiber-Locking. The Pati-Salam gauge symmetry (SU(4) x SU(2)_L x SU(2)_R)/Z_2 is determined entirely by the X_F13 toric fiber and is invariant under variation of the base surface within the surviving family {dP_3, dP_5, dP_7}. The base geometry affects the chiral spectrum details, flux distribution, tadpole margin, Yukawa multiplicity, moduli stabilization landscape, but leaves the gauge group unchanged. The derivation chain for gauge group selection is: framework constraints (K10, K11, K12) leads to Dark Dimension boundary conditions (SF-G2 divisor transversality) leads to X_F13 fiber selection leads to Pati-Salam. The base choice is a secondary vacuum selection problem within a three-element discrete landscape. Source: Del Pezzo Exclusion Sweep report, Fiber Exclusion Sweep report.","formal_status":"nl","load_bearing":true},"sf-mix-001":{"id":"sf-mix-001","kind":"transformation","label":"SF-MIX-001: Auxiliary-field structure required for Higgs sector kinetic term in MMSW gravity","statement":"SF-MIX-001: Auxiliary-field structure required for Higgs sector kinetic term in MMSW gravity. Scalar kinetic terms in MacDowell-Mansouri-Stelle-West (MMSW) gravity cannot be written as direct (D phi)^dagger (D phi) constructions because the Hodge dual on the gauge-fiber side of the MMSW action produces an antisymmetric mu-nu structure that vanishes as a Klein-Gordon kinetic term (Langenscheidt 2019, Section 4.2). The principled resolution is a first-order auxiliary action with the scalar promoted to a 5-vector phi^A; the radial mode phi^5 propagates and the four Lorentz components phi^a are auxiliary, eliminated by algebraic equations of motion. This structure is forced by SO(1,4) covariance and is the standard treatment in the MMSW literature (Stelle-West 1980, Langenscheidt 2019). The framework's earlier implicit treatment of -(partial rho)^2 as a directly-displayable Jordan-frame kinetic term was a documentation gap inherited from the terse compensator handling in Stelle-West. Generalization: any pre-geometric gauge-theoretic gravity construction with internal gauge symmetry larger than SO(1,3) and a scalar Higgs sector breaking to SO(1,3) faces the same obstruction; the resolution is universally an auxiliary-field formulation forced by the gauge-fiber Hodge dual structure. Scope: applies to any MMSW or related broken gauge-theoretic gravity construction with propagating scalar mode. Source: Langenscheidt 2019 (arXiv:1907.10440), ChatGPT S-MIX-002 Path B Survey (April 2026), ChatGPT S-MIX-004 Weyl Rescaling Verification (April 2026), Path B Resolution Synthesis (April 2026).","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-mix-001"],"composition":"none","function":"derive","math":"SF-MIX-001: Auxiliary-field structure required for Higgs sector kinetic term in MMSW gravity. Scalar kinetic terms in MacDowell-Mansouri-Stelle-West (MMSW) gravity cannot be written as direct (D phi)^dagger (D phi) constructions because the Hodge dual on the gauge-fiber side of the MMSW action produces an antisymmetric mu-nu structure that vanishes as a Klein-Gordon kinetic term (Langenscheidt 2019, Section 4.2). The principled resolution is a first-order auxiliary action with the scalar promoted to a 5-vector phi^A; the radial mode phi^5 propagates and the four Lorentz components phi^a are auxiliary, eliminated by algebraic equations of motion. This structure is forced by SO(1,4) covariance and is the standard treatment in the MMSW literature (Stelle-West 1980, Langenscheidt 2019). The framework's earlier implicit treatment of -(partial rho)^2 as a directly-displayable Jordan-frame kinetic term was a documentation gap inherited from the terse compensator handling in Stelle-West. Generalization: any pre-geometric gauge-theoretic gravity construction with internal gauge symmetry larger than SO(1,3) and a scalar Higgs sector breaking to SO(1,3) faces the same obstruction; the resolution is universally an auxiliary-field formulation forced by the gauge-fiber Hodge dual structure. Scope: applies to any MMSW or related broken gauge-theoretic gravity construction with propagating scalar mode. Source: Langenscheidt 2019 (arXiv:1907.10440), ChatGPT S-MIX-002 Path B Survey (April 2026), ChatGPT S-MIX-004 Weyl Rescaling Verification (April 2026), Path B Resolution Synthesis (April 2026).","formal_status":"nl","load_bearing":true},"sf-mix-002":{"id":"sf-mix-002","kind":"transformation","label":"SF-MIX-002 (v4.11): First-order matter Lagrangian primary blocks have rank 2 w","statement":"SF-MIX-002 (v4.11): First-order matter Lagrangian primary blocks have rank 2 with secondary promotion of null primaries. Primary-primary Dirac sub-blocks for first-order matter Lagrangians, where canonical momenta are linear in fields rather than velocities, generically have rank 2 in a 5-dimensional auxiliary sector, not full rank. The Darboux structure decomposes the primary constraints into one second-class pair plus null combinations orthogonal to the kinetic projection vector f_a. The null primary combinations are not gauge generators; they are promoted to second-class via brackets with the secondary constraints generated by their own preservation under the Hamiltonian. The promotion mechanism depends on the algebraic structure of the auxiliary EOM, specifically the identity coefficient on the auxiliary fields. Operational test: given a first-order Lagrangian for fields (phi^A) = (phi^5, phi^a) with one component propagating and the rest auxiliary, count primary constraints via Pi_A - partial L/partial(dot phi^A) = 0, compute the primary-primary Dirac block, and identify null directions orthogonal to the kinetic projection. The expected rank is 2k where k is the number of velocity-coupling kinematic projections. Promotion of null primaries proceeds through secondary constraints with brackets M_rs = -G_rs delta^3 on the orthogonal subspace. Scope: applies to MMSW gravity with auxiliary scalars (Langenscheidt 2019), BF theory with matter, Stelle-West compensators, Dirac fermions in canonical analysis, and any first-order matter Lagrangian where auxiliary fields are eliminated via algebraic EOMs. Distinct from the standard Dirac-Bergmann pattern for second-order Lagrangians, where primary blocks are typically full rank. Source: ChatGPT S-MIX-005a Report (April 2026), ChatGPT S-MIX-005b Report (April 2026), Langenscheidt 2019 (arXiv:1907.10440).","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-mix-002"],"composition":"none","function":"derive","math":"SF-MIX-002 (v4.11): First-order matter Lagrangian primary blocks have rank 2 with secondary promotion of null primaries. Primary-primary Dirac sub-blocks for first-order matter Lagrangians, where canonical momenta are linear in fields rather than velocities, generically have rank 2 in a 5-dimensional auxiliary sector, not full rank. The Darboux structure decomposes the primary constraints into one second-class pair plus null combinations orthogonal to the kinetic projection vector f_a. The null primary combinations are not gauge generators; they are promoted to second-class via brackets with the secondary constraints generated by their own preservation under the Hamiltonian. The promotion mechanism depends on the algebraic structure of the auxiliary EOM, specifically the identity coefficient on the auxiliary fields. Operational test: given a first-order Lagrangian for fields (phi^A) = (phi^5, phi^a) with one component propagating and the rest auxiliary, count primary constraints via Pi_A - partial L/partial(dot phi^A) = 0, compute the primary-primary Dirac block, and identify null directions orthogonal to the kinetic projection. The expected rank is 2k where k is the number of velocity-coupling kinematic projections. Promotion of null primaries proceeds through secondary constraints with brackets M_rs = -G_rs delta^3 on the orthogonal subspace. Scope: applies to MMSW gravity with auxiliary scalars (Langenscheidt 2019), BF theory with matter, Stelle-West compensators, Dirac fermions in canonical analysis, and any first-order matter Lagrangian where auxiliary fields are eliminated via algebraic EOMs. Distinct from the standard Dirac-Bergmann pattern for second-order Lagrangians, where primary blocks are typically full rank. Source: ChatGPT S-MIX-005a Report (April 2026), ChatGPT S-MIX-005b Report (April 2026), Langenscheidt 2019 (arXiv:1907.10440).","formal_status":"nl","load_bearing":true},"sf-mix-003":{"id":"sf-mix-003","kind":"transformation","label":"SF-MIX-003 (v4.11): Orthogonal projection of algebraic auxiliary EOM produces ","statement":"SF-MIX-003 (v4.11): Orthogonal projection of algebraic auxiliary EOM produces primary-secondary bracket rank determined by orthogonal subspace dimension. When secondary constraints from preservation of null primaries take the form S_r = s^(r)a A_a with A_a = eta_ab phi^b + B_a(lower-order), the bracket matrix with the original null primaries is M_rs = -s^(r)a s^(s)b eta_ab delta^3 + Delta_rs, the Gram matrix of basis vectors s^(r) in the internal metric restricted to the orthogonal complement H_f = {u^a : u^a f_a = 0}. Generic rank equals dim H_f. Lower-order covariantization terms shift the inhomogeneous part of A_a but do not affect the identity coefficient on phi^a, hence do not threaten rank generically. Degeneracy conditions: f_a = 0, kinetic projection vanishes; f_a f^a = 0, null kinetic projection in Lorentzian internal metric; or accidental tuning of lower-order background. None of these are generic broken-vacuum configurations. Constant-volume simplifications (D_mu e^mu_a = 0) are convenience for the reduced scalar equation, not structural requirements for rank. Scope: applies wherever first-order matter Lagrangians produce algebraic auxiliary EOMs with identity coefficient on auxiliary fields. Operational test: identify the kinetic projection vector f_a, compute the orthogonal complement, verify the Gram matrix is invertible on a basis of the complement. Source: ChatGPT S-MIX-005b Report (April 2026), Langenscheidt 2019 (arXiv:1907.10440).","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-mix-003"],"composition":"none","function":"derive","math":"SF-MIX-003 (v4.11): Orthogonal projection of algebraic auxiliary EOM produces primary-secondary bracket rank determined by orthogonal subspace dimension. When secondary constraints from preservation of null primaries take the form S_r = s^(r)a A_a with A_a = eta_ab phi^b + B_a(lower-order), the bracket matrix with the original null primaries is M_rs = -s^(r)a s^(s)b eta_ab delta^3 + Delta_rs, the Gram matrix of basis vectors s^(r) in the internal metric restricted to the orthogonal complement H_f = {u^a : u^a f_a = 0}. Generic rank equals dim H_f. Lower-order covariantization terms shift the inhomogeneous part of A_a but do not affect the identity coefficient on phi^a, hence do not threaten rank generically. Degeneracy conditions: f_a = 0, kinetic projection vanishes; f_a f^a = 0, null kinetic projection in Lorentzian internal metric; or accidental tuning of lower-order background. None of these are generic broken-vacuum configurations. Constant-volume simplifications (D_mu e^mu_a = 0) are convenience for the reduced scalar equation, not structural requirements for rank. Scope: applies wherever first-order matter Lagrangians produce algebraic auxiliary EOMs with identity coefficient on auxiliary fields. Operational test: identify the kinetic projection vector f_a, compute the orthogonal complement, verify the Gram matrix is invertible on a basis of the complement. Source: ChatGPT S-MIX-005b Report (April 2026), Langenscheidt 2019 (arXiv:1907.10440).","formal_status":"nl","load_bearing":true},"sf-mm-002":{"id":"sf-mm-002","kind":"transformation","label":"SF-MM-002 (v4.12): Isolated 30x30 spatial connection symbol has rank 12 with 18-dimensional kernel","statement":"SF-MM-002 (v4.12): Isolated 30x30 spatial connection symbol has rank 12 with 18-dimensional kernel. In the broken phase <phi^A> = v delta^A_4, the principal symbol of the multiplier preservation operator restricted to the 30 spatial connection primary constraints Z^i_AB has the explicit form sigma_ZZ^(i,ab;l,cd)(xi) = 8i alpha (v+rho) epsilon_abcd epsilon^(0ikl) xi_k with sigma_ZZ^(i,a4;l,CD)(xi) = 0. Factorization: sigma_ZZ = 8i alpha (v+rho) star_int tensor curl_xi. For xi not equal to 0, rank is 12 with 18-dimensional left kernel decomposing as 6 longitudinal Lorentz modes plus 12 broken-sector a4 modes. The 6 longitudinal directions are R^(i,ab)_Lambda = xi^i Lambda^ab for antisymmetric Lambda^ab. The 12 broken-row directions are R^(i,a4)_X = X^ia for arbitrary X^ia. Full ellipticity therefore requires cross-block contributions: torsion cross-block sigma_TZ^(a,jk;b4,l)(xi) = (i/m) delta^a_b (delta^l_k xi_j - delta^l_j xi_k) structurally lifts the 12 broken-row directions; the 6 longitudinal Lorentz directions require the scalar-gradient cross-block whose form depends on the explicit F_i. Source: S-MM-002 Preliminary Report (April 2026), S-MM-002-alpha/beta reports.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-mm-002"],"composition":"none","function":"derive","math":"SF-MM-002 (v4.12): Isolated 30x30 spatial connection symbol has rank 12 with 18-dimensional kernel. In the broken phase <phi^A> = v delta^A_4, the principal symbol of the multiplier preservation operator restricted to the 30 spatial connection primary constraints Z^i_AB has the explicit form sigma_ZZ^(i,ab;l,cd)(xi) = 8i alpha (v+rho) epsilon_abcd epsilon^(0ikl) xi_k with sigma_ZZ^(i,a4;l,CD)(xi) = 0. Factorization: sigma_ZZ = 8i alpha (v+rho) star_int tensor curl_xi. For xi not equal to 0, rank is 12 with 18-dimensional left kernel decomposing as 6 longitudinal Lorentz modes plus 12 broken-sector a4 modes. The 6 longitudinal directions are R^(i,ab)_Lambda = xi^i Lambda^ab for antisymmetric Lambda^ab. The 12 broken-row directions are R^(i,a4)_X = X^ia for arbitrary X^ia. Full ellipticity therefore requires cross-block contributions: torsion cross-block sigma_TZ^(a,jk;b4,l)(xi) = (i/m) delta^a_b (delta^l_k xi_j - delta^l_j xi_k) structurally lifts the 12 broken-row directions; the 6 longitudinal Lorentz directions require the scalar-gradient cross-block whose form depends on the explicit F_i. Source: S-MM-002 Preliminary Report (April 2026), S-MM-002-alpha/beta reports.","formal_status":"nl","load_bearing":true},"sf-mm-003":{"id":"sf-mm-003","kind":"transformation","label":"SF-MM-003 (v4.12): Subprincipal entries in MMSW multiplier matrix are lower d","statement":"SF-MM-003 (v4.12): Subprincipal entries in MMSW multiplier matrix are lower differential order than the principal curl symbol. The connection-dependent subprincipal contribution U_M from the SO(1,4) covariant derivative D_j in the Frechet variation of Z^i_AB is ultra-local, order zero in spatial derivatives, while the principal curl symbol sigma_M is order one. Therefore U_M does not upgrade the principal-symbol rank used in the ellipticity problem. It can affect frozen-background multiplier solving as an algebraic lower-order term, but the principal rank stays at the curl-driven value, 12 in the 30-component spatial connection block. Tetrad-derivative entries in the Higgs-primary multiplier columns (delta f_a / delta A_i^b4) are similarly ultra-local. The DOF reduction beyond the principal rank therefore requires a configuration-robustness theorem (S-MM-CR) that the standard MM literature does not derive; the rank lift from 18 to the physical secondary count is generically background-sensitive. This is a generic feature of MMSW canonical analyses with auxiliary scalars, not specific to the Langenscheidt formulation. The standard MM literature on Hamiltonian constraint analysis presupposes the configuration-robustness condition without explicit derivation. Source: S-MM-002-gamma Report (April 2026).","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["sf-mm-003"],"composition":"none","function":"derive","math":"SF-MM-003 (v4.12): Subprincipal entries in MMSW multiplier matrix are lower differential order than the principal curl symbol. The connection-dependent subprincipal contribution U_M from the SO(1,4) covariant derivative D_j in the Frechet variation of Z^i_AB is ultra-local, order zero in spatial derivatives, while the principal curl symbol sigma_M is order one. Therefore U_M does not upgrade <script>
// Forked from upstream/epistack/periphery/navigate/render/rail.js (pin b778f35) into the
//   parent repo for the DG read surface, per the fork-out-then-edit pattern. Unedited: no
//   data or API dependency.
// Role: the spine rail. The decomposition path from the root claim to the focused node,
//   horizontal and clickable to jump back up. "Where am I and how do I get back", always
//   visible.
// Contract: renderRail(pathNodes, onJump, caseLabel)->Element. pathNodes is the ordered
//   list of nodes from root to focused; onJump(index) truncates the path to that node.
// Invariant: view depends on engine depends on data, never the reverse. The rail
//   is the navigation trail the app maintains, not a graph computed from parents (the DAG
//   has many parents; the path is the clicks the user took).
"use strict";

function renderRail(pathNodes, onJump, caseLabel) {
  const rail = document.createElement("nav");
  rail.className = "rail";

  if (caseLabel) {
    const tag = document.createElement("span");
    tag.className = "rail-case";
    tag.textContent = caseLabel;
    rail.appendChild(tag);
    const sep = document.createElement("span");
    sep.className = "rail-sep";
    sep.textContent = "/";
    rail.appendChild(sep);
  }

  pathNodes.forEach((node, i) => {
    const last = i === pathNodes.length - 1;
    const seg = document.createElement(last ? "span" : "button");
    seg.className = "rail-seg" + (last ? " rail-current" : "");
    seg.textContent = node.label || node.id;
    if (!last) seg.addEventListener("click", () => onJump(i));
    rail.appendChild(seg);
    if (!last) {
      const sep = document.createElement("span");
      sep.className = "rail-sep";
      sep.textContent = "›";
      rail.appendChild(sep);
    }
  });

  return rail;
}

if (typeof module !== "undefined" && module.exports) module.exports = { renderRail };

</script>

function typeset(el, tex, plain, display) {
  if (typeof katex !== "undefined" && katex.render) {
    try { katex.render(tex, el, { displayMode: !!display, throwOnError: false }); return; }
    catch (e) { /* fall through */ }
  }
  el.textContent = plain != null ? plain : tex;
}

const KINDLINE = {
  question: "a question to take apart",
  transformation: "a step in the reasoning",
  assumption: "an assumption you can flip",
  primitive: "a basis you already trust",
  observation: "a fact from the world",
  prediction: "what the reasoning predicts",
  comparison: "the test that closes it",
  claim: "a claim",
};

// the card is a registered component: pick its layout id (an explicit `card` ref, else a
// default by whether the node teaches), resolve the descriptor for existence, and dispatch
// to the matching renderer. Forkable like any component (a fork of card.teaching renders here).
const CARD_RENDERERS = { "card.teaching": renderTeachingCard, "card.terse": renderTerseCard };

function renderCard(node, ctx) {
  ctx = ctx || {};
  // the layout is the client's call (its kind-to-look mapping), not the node's. Fall back to
  // the teaching layout when the node carries an explain block, else terse.
  const layoutId = ctx.layout === "terse" ? "card.terse" : ctx.layout === "teaching" ? "card.teaching" : node.explain ? "card.teaching" : "card.terse";
  const render = CARD_RENDERERS[layoutId] || renderTerseCard;
  return render(node, ctx);
}

// ---- the learning-first card ----
function renderTeachingCard(node, ctx) {
  // a node with no teaching content (an authored explain block) cannot render the learning-first
  // layout even when a client maps its kind to it; fall back to the terse card rather than break.
  if (!node.explain) return renderTerseCard(node, ctx);
  const e = node.explain;
  const card = vEl("article", "card teaching kind-" + node.kind);

  card.appendChild(vEl("div", "kindline", `<span class="dot"></span> ${esc(KINDLINE[node.kind] || "a step")}`));
  card.appendChild(vEl("h1", "hook", esc(e.hook)));
  if (e.intuition) card.appendChild(vEl("p", "intuition", esc(e.intuition)));

  // the math, communicated (only when the node carries an equation and reads as a sentence)
  if (node.math && typeof node.math === "object" && e.in_words) {
    const sec = vEl("section");
    sec.appendChild(vEl("p", "eyebrow", "The one line of math"));
    const wrap = vEl("div", "math-wrap");
    const disp = vEl("div", "math-display");
    typeset(disp, node.math.tex, node.math.plain, true);
    wrap.appendChild(disp);
    wrap.appendChild(vEl("p", "math-says", esc(e.in_words)));
    if (Array.isArray(e.symbols) && e.symbols.length) {
      const gl = vEl("div", "glosses");
      e.symbols.forEach((s) => {
        const g = vEl("div", "gloss");
        const sym = vEl("span", "sym");
        typeset(sym, s.sym, s.sym, false);
        g.appendChild(sym);
        g.appendChild(vEl("span", "def", esc(s.plain)));
        gl.appendChild(g);
      });
      wrap.appendChild(gl);
    }
    if (node.math.assumes) wrap.appendChild(vEl("p", "assumes", `<b>This only works if</b> ${esc(node.math.assumes)}.`));
    sec.appendChild(wrap);
    card.appendChild(sec);
  }

  // the visual, supplied by the client (it maps this node's kind to a visual and renders it
  // from the node's presentation.data). The card never names a visual.
  if (ctx.visualEl) {
    const sec = vEl("section");
    sec.appendChild(vEl("p", "eyebrow", "See it"));
    sec.appendChild(ctx.visualEl);
    if (ctx.visualAside) sec.appendChild(vEl("p", "viz-aside", esc(ctx.visualAside)));
    card.appendChild(sec);
  }

  // the break, as a concrete scenario
  if (e.scenario) {
    const br = vEl("section", "break");
    br.appendChild(vEl("p", "eyebrow", node.kind === "question" ? "The catch" : "Where it breaks"));
    br.appendChild(vEl("p", null, esc(e.scenario)));
    card.appendChild(br);
  }

  // the stakes
  if (e.stakes) {
    const sec = vEl("section");
    sec.appendChild(vEl("p", "eyebrow", "Why it matters"));
    sec.appendChild(vEl("p", "stakes", esc(e.stakes)));
    card.appendChild(sec);
  }

  // the precise version: the inspect layer behind a disclosure (the terse, audit-grade fields)
  if (hasInspect(node)) card.appendChild(renderInspect(node));

  card.appendChild(renderMotions(node, ctx));
  return card;
}

function hasInspect(node) {
  return node.role || node.breaks || node.why_breaks || (node.children && node.children.length) || node.math;
}

function renderInspect(node) {
  const d = vEl("details", "precise");
  d.appendChild(vEl("summary", null, '<span class="chev">▸</span> See the precise version'));
  const box = vEl("div", "inspect");
  const row = (k, v) => `<div class="row"><span class="k">${esc(k)}</span><span class="v">${v}</span></div>`;
  let rows = "";
  const kindMeta = [node.kind, node.composition, node.function].filter(Boolean).join(" · ");
  rows += row("kind", esc(kindMeta) + (node.formal_status ? ` <span class="fbadge">${esc(node.formal_status)}</span>` : ""));
  if (node.role) rows += row("role", esc(node.role));
  if (node.takes || node.produces) rows += row("takes", esc((node.takes || []).join(", ")) + " &rarr; " + esc((node.produces || []).join(", ")));
  if (node.breaks) rows += row("breaks", esc(node.breaks));
  if (node.why_breaks) rows += row("why", esc(node.why_breaks));
  if (node.math) rows += row("math", esc(typeof node.math === "object" ? node.math.plain : node.math));
  if (node.children && node.children.length) rows += row("floor", "decomposes to " + node.children.map(esc).join(", "));
  box.innerHTML = rows;
  d.appendChild(box);
  return d;
}

// ---- the terse fallback card (primitives, closure nodes; no teaching layer) ----
function renderTerseCard(node, ctx) {
  const card = vEl("article", "card terse kind-" + node.kind);
  card.appendChild(vEl("div", "kindline", `<span class="dot"></span> ${esc(KINDLINE[node.kind] || node.kind)}`));
  card.appendChild(vEl("h1", "hook small", esc(node.label || node.id)));
  if (node.role) card.appendChild(vEl("p", "intuition", esc(node.role)));
  if (node.kind === "primitive" && node.citation) {
    const c = vEl("div", "basis-block");
    const tgt = node.citation.target ? ` <span class="basis-target">(${esc(node.citation.target)})</span>` : "";
    c.innerHTML = `<span class="basis-tag">coordinate basis</span><p>Proof: ${esc(node.citation.source || "")}${tgt}. Not built here.</p>`;
    card.appendChild(c);
  } else if (node.world_value) {
    card.appendChild(vEl("div", "basis-block", `<span class="basis-tag">world-fact</span><p>${esc(node.world_value)}</p>`));
  } else if (node.value) {
    card.appendChild(vEl("div", "basis-block", `<span class="basis-tag">prediction</span><p>${esc(node.value)}</p>`));
  } else if (node.test) {
    card.appendChild(vEl("div", "basis-block", `<span class="basis-tag">the test</span><p>${esc(node.test)}</p>`));
  }
  card.appendChild(renderMotions(node, ctx));
  return card;
}

function renderMotions(node, ctx) {
  const m = ctx.motions || {};
  const foot = vEl("div", "motions");
  if (m.decompose) {
    const n = (node.children || []).length;
    foot.innerHTML += `<span class="motion on"><span class="g">↓</span> ${node.kind === "question" ? "take it apart" : "made of " + n + " step" + (n === 1 ? "" : "s")}</span>`;
  } else if (node.kind === "primitive") {
    foot.innerHTML += `<span class="motion wall"><span class="g">■</span> basis reached</span>`;
  } else {
    foot.innerHTML += `<span class="motion wall">given</span>`;
  }
  if (ctx.reveal) {
    const r = vEl("button", "motion reveal");
    r.innerHTML = `<span class="g">↗</span> ${esc(ctx.reveal.label)}`;
    r.addEventListener("click", ctx.reveal.onReveal);
    foot.appendChild(r);
  }
  // the compare motion: active (a button) when the app supplies a handler, else shown as later
  if (ctx.onCompare) {
    const c = vEl("button", "motion compare-on");
    c.innerHTML = `<span class="g">↔</span> ${esc(ctx.compareLabel || "compare the two cases")}`;
    c.addEventListener("click", ctx.onCompare);
    foot.appendChild(c);
  } else if (m.compare && m.compare.available) {
    foot.innerHTML += `<span class="motion later"><span class="g">↔</span> also in ${m.compare.count} cases <span class="tag">compare</span></span>`;
  }
  // the perturb motion: a live "flip this" / "reset" control when the client supplies handlers
  // (the fat client), else shown as later. The client displays the engine-computed overlay; the
  // card writes no truth field.
  if (m.perturb) {
    if (ctx.onPerturb) {
      const p = vEl("button", "motion perturb-on" + (ctx.perturbActive ? " active" : ""));
      p.innerHTML = `<span class="g">↻</span> ${ctx.perturbActive ? "reset to as-argued" : "flip this assumption"}`;
      p.addEventListener("click", ctx.perturbActive ? ctx.onResetPerturb : ctx.onPerturb);
      foot.appendChild(p);
    } else {
      foot.innerHTML += `<span class="motion later"><span class="g">↻</span> flip this <span class="tag">perturb</span></span>`;
    }
  }
  return foot;
}

// the collapsed one-line child card; clicking promotes it to focused
function renderChildCard(entry, onClick) {
  const node = entry.node;
  const row = vEl("button", "child-card child-" + entry.kind);
  const meta = entry.kind === "primitive" ? "basis" : entry.expandable ? "open" : "given";
  const label = (node.explain && node.explain.hook) || node.label || node.id;
  row.innerHTML =
    `<span class="child-dot dot-${entry.kind}"></span>` +
    `<span class="child-label">${esc(label)}</span>` +
    `<span class="child-meta">${meta}</span>`;
  row.addEventListener("click", () => onClick(node.id));
  return row;
}

if (typeof module !== "undefined" && module.exports) module.exports = { renderCard, renderChildCard };

</script>
<script>
// Forked from upstream/epistack/periphery/navigate/fat/thin.js (pin b778f35) into the parent
//   repo for the DG read surface, per the fork-out-then-edit pattern. EDITED: the original calls
//   api.motions(focusedId), a fat-only method with no DG analog; this fork instead derives the
//   same shape directly from decompose's own children count, since motions.decompose is the only
//   part renderCard actually reads for a thin client (motions.compare and motions.perturb simply
//   stay absent, which renderCard already handles by falling back to its "given"/"later" states).
// Role: a THIN client. Tokens plus a kind-to-look mapping over the default read path (drill).
//   It restyles the response and nothing more; it covers every node kind, so it renders the
//   whole map.
// Contract: renderThin(api, mount, client, opts) -> void. Uses only api.entry / has / resolve /
//   decompose / kinds; no compare, no dependents, no perturb, no custom composition.
// Invariant: a client of the API, read-only against truth. It carries the render-everything
//   guarantee: its mapping has an entry for every kind in api.kinds().
"use strict";

function renderThin(api, mount, client, opts) {
  opts = opts || {};
  const mapping = client.mapping || {};
  const start = opts.node && api.has(opts.node) ? opts.node : api.entry();
  const state = { path: [start] };

  function focusChild(id) { if (!api.has(id)) return; state.path.push(id); render(); }
  function jumpTo(i) { state.path = state.path.slice(0, i + 1); render(); }
  function layoutFor(node) {
    const m = mapping[node.presentation && node.presentation.type];
    return m && m.layout ? m.layout : node.explain ? "teaching" : "terse";
  }
  // the visual the manifest maps this node's kind to (or none), rendered from presentation.data.
  // DG's own mapping never names a visual (no selection-step/sufficiency-step data exists in
  // this corpus), so this stays inert but is kept for parity with the reference renderer.
  function visualFor(node) {
    const m = mapping[node.presentation && node.presentation.type];
    if (!m || !m.visual || m.visual === "none" || typeof renderVisual !== "function") return null;
    const d = (node.presentation && node.presentation.data) || {};
    return renderVisual(m.visual, d);
  }

  function render() {
    mount.innerHTML = "";
    const pathNodes = state.path.map((id) => api.resolve(id)).filter(Boolean);
    const focusedId = state.path[state.path.length - 1];
    const focused = api.resolve(focusedId);

    const fv = api.decompose(focusedId);
    const motions = { decompose: fv.children.length > 0 };

    mount.appendChild(renderRail(pathNodes, jumpTo, client.title || "DG reader"));
    mount.appendChild(renderCard(focused, { layout: layoutFor(focused), visualEl: visualFor(focused), motions }));

    if (fv.children.length) {
      const wrap = document.createElement("section");
      wrap.className = "children";
      const h = document.createElement("h3"); h.className = "children-head"; h.textContent = "made of";
      wrap.appendChild(h);
      fv.children.forEach((entry) => wrap.appendChild(renderChildCard(entry, focusChild)));
      mount.appendChild(wrap);
    }
    window.scrollTo({ top: 0 });
  }
  render();
}

</script>
<script>
// Role: the DG artifact's host. Wraps the precomputed snapshot (window.DG_SNAPSHOT, inlined by
//   build/bundle-dg-navigate.mjs from api/dg-client-adapter.mjs's buildDgSnapshot()) into the
//   same resolve/has/decompose/kinds/entry functional shape createDgClientAdapter() exposes in
//   Node, then mounts the single registered client. A simplified fork of the wiring role
//   upstream/epistack/periphery/navigate/render/host.js plays (pin b778f35): that file also
//   builds a multi-client gallery with hash routing and manifest validation, none of which this
//   single fixed DG client needs.
// Contract: boots on DOMContentLoaded. Reads window.DG_SNAPSHOT and DG_CLIENT (both inlined by
//   the bundler), mounts into #app.
// Invariant: no live kernel import runs in the browser; the snapshot was computed once in Node
//   at build time by the complete path (buildKernel, characterizedGaps), never re-derived here.
"use strict";

(function () {
  function makeDgApi(snapshot) {
    return {
      kinds: () => snapshot.kinds.slice(),
      has: (id) => !!snapshot.nodes[id],
      resolve: (id) => snapshot.nodes[id],
      decompose: (id) => {
        const node = snapshot.nodes[id];
        if (!node) return { node: undefined, children: [] };
        const childRefs = snapshot.children[id] || [];
        return {
          node,
          children: childRefs.map((cref) => {
            const cnode = snapshot.nodes[cref];
            return { node: cnode, kind: cnode.presentation.type, expandable: (snapshot.children[cref] || []).length > 0 };
          }),
        };
      },
      entry: () => snapshot.entry,
    };
  }

  function applyTokens(tokens) {
    const r = document.documentElement;
    if (tokens) for (const k of Object.keys(tokens)) r.style.setProperty(k, tokens[k]);
  }

  function boot() {
    const mount = document.getElementById("app");
    if (!mount) return;
    const snapshot = typeof DG_SNAPSHOT !== "undefined" ? DG_SNAPSHOT : null;
    if (!snapshot) { mount.textContent = "DG snapshot missing."; return; }
    const api = makeDgApi(snapshot);
    const client = typeof DG_CLIENT !== "undefined" ? DG_CLIENT : { mapping: {}, title: "DG reader" };
    applyTokens(client.tokens);
    renderThin(api, mount, client, {});
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>
