<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Displacement Geometry reader</title>
<style>
/* Forked from upstream/epistack/periphery/navigate/render/styles/decompose.css (pin b778f35)
   into the parent repo for the DG read surface, per the fork-out-then-edit pattern. Unedited.
   CORRECTION: the prior fork of this file inlined render/styles/main.css instead, which styles
   an unrelated surface (no .rail/.card/.kindline selectors at all, only body/register rules);
   decompose.css is the stylesheet whose own header names card.js/rail.js as its contract, the
   actual components this build forks and uses.
   Role: styles for the v2 learning-first decompose surface. Ported from card-prototype.html
   (the searchlight world: a cool daylight reading surface, ink text, one warm lamp-amber
   for attention, a cool slate for what is really there).
   Contract: classes emitted by view/card.js, view/visuals.js, view/rail.js, decompose-app.js.
   Invariant: presentation only; no behavior, no data. */

:root {
  --paper: #e7eaec;
  --paper-2: #dfe3e6;
  --ink: #1a2026;
  --ink-soft: #48555f;
  --ink-faint: #8995a0;
  --rule: #cdd3d8;
  --lamp: #e8a33d;
  --lamp-deep: #c9852a;
  --slate: #647682;
  --night: #141a1f;
  --danger: #c5604b;
  --serif: "Newsreader", Georgia, serif;
  --sans: "Hanken Grotesk", system-ui, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, monospace;
  --measure: 62ch;
  --r: 14px;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0; background: var(--paper); color: var(--ink);
  font-family: var(--serif); font-size: 18px; line-height: 1.62;
  -webkit-font-smoothing: antialiased;
}
.page { max-width: 720px; margin: 0 auto; padding: 40px 20px 96px; }

.topbar { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: .2rem; }
.topbar h1 { font-family: var(--sans); font-weight: 700; font-size: 1.05rem; letter-spacing: .01em; margin: 0; }
.home-btn { font-family: var(--sans); font-size: .8rem; font-weight: 600; color: var(--ink-soft); background: var(--paper-2); border: 1px solid var(--rule); border-radius: 9px; padding: 7px 13px; cursor: pointer; }
.home-btn:hover { border-color: var(--ink-faint); }
.lede { color: var(--ink-soft); font-size: .98rem; max-width: 58ch; margin: .2rem 0 1.8rem; }

/* rail = the path you drilled (the prototype's crumb, made navigable) */
.rail { font-family: var(--sans); font-size: .78rem; font-weight: 500; color: var(--ink-faint); letter-spacing: .01em; margin: 0 2px 26px; line-height: 1.6; display: flex; flex-wrap: wrap; align-items: center; gap: .35rem; }
.rail-case { color: var(--lamp-deep); font-weight: 600; }
.rail-sep { opacity: .55; }
.rail-seg { background: none; border: none; padding: 0; font: inherit; color: var(--ink-faint); cursor: pointer; }
.rail-seg:hover { color: var(--ink-soft); text-decoration: underline; }
.rail-current { color: var(--ink-soft); font-weight: 600; }

/* card */
.kindline { font-family: var(--sans); font-size: .74rem; font-weight: 600; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .1em; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--slate); display: inline-block; }
.hook { font-family: var(--sans); font-weight: 700; font-size: 2.05rem; line-height: 1.12; letter-spacing: -.02em; margin: .1em 0 .55em; color: var(--ink); }
.hook.small { font-size: 1.5rem; }
.intuition { font-size: 1.18rem; line-height: 1.6; margin: 0 0 1.6em; max-width: var(--measure); }

section { margin: 0 0 2.2em; }
.eyebrow { font-family: var(--sans); font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .13em; color: var(--ink-faint); margin: 0 0 10px; display: flex; align-items: center; gap: 9px; }
.eyebrow::after { content: ""; flex: 1; height: 1px; background: var(--rule); }

/* the math, communicated */
.math-wrap { background: var(--paper-2); border: 1px solid var(--rule); border-radius: var(--r); padding: 22px 24px 18px; }
.math-display { font-size: 1.1rem; margin: .1em 0 .2em; text-align: center; color: var(--ink); }
.math-says { font-family: var(--serif); font-size: 1.02rem; color: var(--ink-soft); text-align: center; margin: .3em auto .9em; max-width: 54ch; }
.glosses { display: grid; gap: 8px; margin: 14px 0 6px; }
.gloss { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: baseline; font-size: .95rem; padding-top: 9px; border-top: 1px dashed var(--rule); }
.gloss .sym { font-family: var(--mono); font-size: .86rem; color: var(--lamp-deep); white-space: nowrap; }
.gloss .def { color: var(--ink-soft); }
.assumes { font-family: var(--sans); font-size: .82rem; color: var(--ink-soft); margin-top: 14px; padding: 8px 12px; background: rgba(232, 163, 61, .1); border-left: 2px solid var(--lamp); border-radius: 0 6px 6px 0; }
.assumes b { font-weight: 600; color: var(--ink); }

/* the searchlight (visual component) */
.scope { background: var(--night); border-radius: var(--r); overflow: hidden; box-shadow: 0 14px 40px -18px rgba(20, 26, 31, .6); }
.scope-head { padding: 16px 20px 4px; color: #aeb9c2; font-family: var(--sans); font-size: .82rem; }
.scope-head b { color: #e7edf2; font-weight: 600; }
.scope svg { display: block; width: 100%; height: auto; }
.scope-controls { padding: 6px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
.slider-row { display: flex; align-items: center; gap: 14px; }
.slider-row label { font-family: var(--sans); font-size: .8rem; color: #9aa6b0; white-space: nowrap; }
input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; border-radius: 4px; background: linear-gradient(90deg, #39434c, #5a6670); outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--lamp); border: 2px solid #2a323a; box-shadow: 0 0 12px rgba(232, 163, 61, .6); cursor: pointer; }
input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--lamp); border: 2px solid #2a323a; box-shadow: 0 0 12px rgba(232, 163, 61, .6); cursor: pointer; }
.btn { font-family: var(--sans); font-size: .82rem; font-weight: 600; color: #e7edf2; background: #2a323a; border: 1px solid #3a444d; border-radius: 9px; padding: 9px 14px; cursor: pointer; align-self: flex-start; }
.btn:hover { background: #333d46; border-color: #4a5560; }
.btn[aria-pressed=true] { background: var(--lamp); color: #23170a; border-color: var(--lamp-deep); }
.scope-caption { padding: 0 20px 20px; color: #c4cdd5; font-family: var(--serif); font-size: 1rem; line-height: 1.5; min-height: 3em; }
.scope-caption .key { color: var(--lamp); font-style: italic; }
.viz-aside { font-family: var(--sans); font-size: .8rem; color: var(--ink-faint); margin: 12px 4px 0; text-align: center; }

/* the break, featured as a story */
.break { border-left: 3px solid var(--danger); background: rgba(197, 96, 75, .06); border-radius: 0 var(--r) var(--r) 0; padding: 18px 22px; max-width: var(--measure); }
.break .eyebrow { color: var(--danger); }
.break .eyebrow::after { background: rgba(197, 96, 75, .25); }
.break p { margin: 0; font-size: 1.06rem; }
.stakes { max-width: var(--measure); color: var(--ink-soft); font-size: 1.02rem; }

/* basis / world-fact blocks (terse cards) */
.basis-block { border: 1px dashed var(--rule); background: var(--paper-2); border-radius: 10px; padding: 14px 16px; margin: .4em 0 1.2em; max-width: var(--measure); }
.basis-tag { font-family: var(--sans); font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--slate); display: block; margin-bottom: .3rem; }
.basis-block p { margin: 0; font-size: .96rem; }
.basis-target { color: var(--ink-faint); }

/* the precise version: inspect/audit layer */
details.precise { margin-top: 1.2em; border-top: 1px solid var(--rule); padding-top: 1.1em; }
details.precise > summary { font-family: var(--sans); font-size: .82rem; font-weight: 600; color: var(--ink-soft); cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px; }
details.precise > summary::-webkit-details-marker { display: none; }
details.precise > summary .chev { transition: transform .2s; color: var(--ink-faint); }
details.precise[open] > summary .chev { transform: rotate(90deg); }
.inspect { font-family: var(--mono); font-size: .82rem; line-height: 1.7; color: var(--ink-soft); background: var(--paper-2); border: 1px solid var(--rule); border-radius: 10px; padding: 14px 16px; margin-top: 14px; }
.inspect .row { display: grid; grid-template-columns: 9ch 1fr; gap: 12px; padding: 3px 0; }
.inspect .k { color: var(--ink-faint); }
.inspect .v { color: var(--ink); }
.fbadge { font-family: var(--sans); font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-faint); border: 1px solid var(--rule); border-radius: 5px; padding: 1px 6px; margin-left: 6px; }

/* gap panel: the objective gaps the API detects at a node, reported read-only, never ranked. */
.gaps { max-width: var(--measure); margin: 1.6em 0 .4em; border: 1px solid var(--rule); border-radius: var(--r); background: var(--paper-2); padding: 16px 18px; }
.gaps-head { font-family: var(--sans); font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); margin: 0 0 4px; }
.gaps-note { font-family: var(--sans); font-size: .85rem; color: var(--ink-soft); margin: 0 0 12px; }
.gap-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.gap { border-left: 3px solid var(--ink-faint); border-radius: 0 8px 8px 0; background: var(--paper); padding: 10px 14px; }
.gap-grounding { border-left-color: var(--danger); }
.gap-freshness { border-left-color: var(--lamp-deep); }
.gap-coverage { border-left-color: var(--lamp); }
.gap-dangling { border-left-color: var(--slate); }
.gap-row { display: flex; align-items: baseline; gap: 10px; }
.gap-kind { font-family: var(--sans); font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink); }
.gap-at { font-family: var(--mono); font-size: .78rem; color: var(--ink-faint); }
.gap-missing { font-family: var(--sans); font-size: .92rem; color: var(--ink); margin: 6px 0 4px; }
.gap-discharge { font-family: var(--sans); font-size: .85rem; color: var(--ink-soft); margin: 0; }
.gap-label { font-weight: 600; color: var(--ink-faint); text-transform: uppercase; font-size: .68rem; letter-spacing: .05em; }
.gap-ref { display: inline-block; font-family: var(--mono); font-size: .72rem; color: var(--ink-faint); margin-top: 6px; }

/* perturbation: the live flip control and the authored-consequence overlay (display-only). */
.motion.perturb-on { font-family: var(--sans); font-size: .82rem; font-weight: 600; color: var(--lamp-deep); background: rgba(232, 163, 61, .12); border: 1px solid var(--lamp); border-radius: 9px; padding: 7px 13px; cursor: pointer; }
.motion.perturb-on.active { color: var(--danger); background: rgba(197, 96, 75, .1); border-color: var(--danger); }
.perturb-overlay { max-width: var(--measure); margin: 1.4em 0 .4em; border: 1px solid var(--danger); border-left-width: 3px; border-radius: var(--r); background: rgba(197, 96, 75, .05); padding: 16px 18px; }
.po-head { font-family: var(--sans); font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--danger); margin: 0 0 4px; }
.po-note { font-family: var(--sans); font-size: .85rem; color: var(--ink-soft); margin: 0 0 12px; }
.po-trail { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.po-link { border-left: 3px solid var(--slate); border-radius: 0 8px 8px 0; background: var(--paper); padding: 10px 14px; }
.po-link.pstate-contradicted { border-left-color: var(--danger); }
.po-link.pstate-sound { border-left-color: var(--lamp-deep); }
.po-link-head { display: flex; align-items: baseline; gap: 10px; }
.po-to { font-family: var(--mono); font-size: .8rem; color: var(--ink); }
.po-state { font-family: var(--sans); font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-faint); }
.pstate-contradicted .po-state { color: var(--danger); }
.po-consequence { font-family: var(--sans); font-size: .92rem; color: var(--ink); margin: 6px 0 0; }

/* motions */
.motions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 2em; padding-top: 1.3em; border-top: 1px solid var(--rule); }
.motion { font-family: var(--sans); font-size: .8rem; font-weight: 500; border-radius: 999px; padding: 8px 14px; display: flex; align-items: center; gap: 7px; border: 1px solid var(--rule); color: var(--ink-soft); background: var(--paper-2); }
.motion.on { color: var(--ink); border-color: #b9c0c6; }
button.motion { cursor: pointer; font: inherit; font-size: .8rem; font-weight: 500; }
.motion.reveal { color: var(--lamp-deep); border-color: var(--lamp); background: rgba(232, 163, 61, .1); }
.motion.wall { color: var(--slate); }
.motion.later { opacity: .62; }
.motion .tag { font-size: .68rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .05em; }

/* collapsed children */
.children { margin-top: 1.8em; }
.children-head { font-family: var(--sans); font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-faint); margin: 0 0 .6rem 2px; }
.child-card { display: flex; align-items: center; gap: .65rem; width: 100%; text-align: left; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 10px; padding: .7rem .9rem; margin-bottom: .55rem; cursor: pointer; font-family: var(--sans); font-size: .95rem; color: var(--ink); }
.child-card:hover { border-color: var(--ink-faint); }
.child-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
.dot-transformation { background: var(--lamp-deep); }
.dot-primitive { background: var(--slate); }
.dot-given { background: var(--ink-faint); }
.child-label { flex: 1 1 auto; font-weight: 500; }
.child-meta { font-size: .72rem; color: var(--ink-faint); text-transform: lowercase; }

/* compare-on motion (active, the sideways reveal) */
.motion.compare-on { color: #23170a; background: var(--lamp); border-color: var(--lamp-deep); }

/* the client switcher (host chrome) */
.switcher { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 0 2px 22px; }
.sw-label { font-family: var(--sans); font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-faint); }
.sw-btn { font-family: var(--sans); font-size: .8rem; font-weight: 500; color: var(--ink-soft); background: var(--paper-2); border: 1px solid var(--rule); border-radius: 999px; padding: 6px 13px; cursor: pointer; }
.sw-btn:hover { border-color: var(--ink-faint); }
.sw-btn.on { color: #fff; background: var(--lamp-deep); border-color: var(--lamp-deep); }
.sw-btn.thin { border-style: dashed; }
.sw-btn.broken { color: var(--danger); border-color: var(--danger); text-decoration: line-through; }
.client-error { font-family: var(--sans); border: 1px solid var(--danger); background: rgba(197, 96, 75, .08); color: var(--ink); border-radius: 10px; padding: 16px 18px; }
.client-error ul { margin: .5em 0 0; padding-left: 1.2em; font-size: .9rem; color: var(--ink-soft); }

/* the static-figure visual (a palette alternative to the live searchlight) */
.selection-static { margin: 0; background: var(--paper-2); border: 1px solid var(--rule); border-radius: var(--r); overflow: hidden; }
.selection-static svg { display: block; width: 100%; height: auto; padding: 8px 8px 0; }
.selection-static .ss-cap { font-family: var(--serif); font-size: .95rem; color: var(--ink-soft); padding: 6px 16px 14px; margin: 0; }

/* the auditor console (token-driven, so tokens reskin it) */
.aud-bar { font-family: var(--mono); font-size: .85rem; display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; padding: 10px 14px; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 10px; margin-bottom: 1.2em; }
.aud-tag { color: var(--lamp); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; font-size: .72rem; }
.aud-id { color: var(--ink); font-weight: 600; }
.aud-kind { color: var(--ink-faint); }
.aud-block { margin: 0 0 1.4em; }
.aud-h { font-family: var(--mono); font-size: .74rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); margin: 0 0 .6em; border-bottom: 1px solid var(--rule); padding-bottom: .35em; }
.aud-rows { font-family: var(--mono); font-size: .82rem; line-height: 1.6; }
.aud-row { display: grid; grid-template-columns: 12ch 1fr; gap: 12px; padding: 3px 0; }
.aud-k { color: var(--ink-faint); }
.aud-v { color: var(--ink); }
.aud-links { display: flex; flex-wrap: wrap; gap: 8px; }
.aud-link { font-family: var(--mono); font-size: .8rem; color: var(--lamp); background: transparent; border: 1px solid var(--rule); border-radius: 6px; padding: 5px 9px; cursor: pointer; }
.aud-link:hover { border-color: var(--lamp); }
.aud-note { font-family: var(--mono); font-size: .8rem; color: var(--ink-soft); line-height: 1.55; margin: 0; }
.aud-gate .aud-h { color: var(--lamp); }

/* the cross-case compare view */
.compare .hook { margin-bottom: .35em; }
.pipeline-row { display: flex; align-items: stretch; gap: 12px; margin: 1.6em 0 1.4em; flex-wrap: wrap; }
.pstage { flex: 1 1 240px; text-align: left; background: var(--paper-2); border: 1px solid var(--rule); border-radius: var(--r); padding: 16px 18px; cursor: pointer; font-family: var(--sans); color: var(--ink); display: flex; flex-direction: column; gap: 4px; min-width: 220px; transition: border-color .15s; }
.pstage:hover { border-color: var(--ink-faint); }
.pstage-step { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-faint); }
.pstage-name { font-size: 1.12rem; font-weight: 700; line-height: 1.2; }
.pstage-role { font-size: .82rem; color: var(--ink-faint); margin-bottom: 2px; }
.pstage.lit { border-color: var(--danger); background: rgba(197, 96, 75, .07); box-shadow: inset 0 0 0 1px rgba(197, 96, 75, .25); }
.break-mark { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: .82rem; font-weight: 600; color: var(--danger); text-transform: uppercase; letter-spacing: .04em; }
.break-mark .bm-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--danger); flex: 0 0 auto; box-shadow: 0 0 0 3px rgba(197, 96, 75, .2); }
.break-plain { font-family: var(--serif); font-size: 1rem; line-height: 1.45; color: var(--ink); font-weight: 400; text-transform: none; letter-spacing: 0; margin-top: 2px; }
.pipe-arrow { align-self: center; color: var(--ink-faint); font-size: 1.3rem; flex: 0 0 auto; }
.compare-takeaway { margin-top: .4em; }

@media (max-width: 560px) {
  body { font-size: 17px; }
  .page { padding: 28px 16px 72px; }
  .hook { font-size: 1.7rem; }
  .gloss { grid-template-columns: 1fr; }
  .inspect .row { grid-template-columns: 1fr; }
  .pipeline-row { flex-direction: column; }
  .pipe-arrow { transform: rotate(90deg); align-self: flex-start; margin-left: 1.5rem; }
}
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

</style>

<script>
var DG_SNAPSHOT = {"kinds":["question","selection-step","sufficiency-step","transformation","primitive","observation","prediction","comparison","assumption","claim"],"entry":"f20","nodes":{"t0.1":{"id":"t0.1","kind":"primitive","label":"T0.1: External Realism","statement":"T0.1: External Realism. An external world exists independent of observation. Physical systems have definite properties whether or not they are measured. The measurement problem in quantum mechanics is a problem of description, not of ontology.","declared_grade":"constitutive","earned_grade":"constitutive","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: axiom","citation":{"source":"trellis.v4-16"}},"t0.2":{"id":"t0.2","kind":"primitive","label":"T0.2: Consistency","statement":"T0.2: Consistency. The external world behaves consistently. Identical initial conditions produce identical outcomes (up to quantum indeterminacy, which is itself consistent). The laws of physics do not change with location, time, or observer.","declared_grade":"constitutive","earned_grade":"constitutive","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: axiom","citation":{"source":"trellis.v4-16"}},"t0.3":{"id":"t0.3","kind":"primitive","label":"T0.3: Describability","statement":"T0.3: Describability. The structure of the external world can be captured by mathematical formalism. Physical theories are maps; the territory exists independently of the map. The effectiveness of mathematics in physics reflects genuine structural correspondence.","declared_grade":"constitutive","earned_grade":"constitutive","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: axiom","citation":{"source":"trellis.v4-16"}},"t0.4":{"id":"t0.4","kind":"primitive","label":"T0.4: Materialism","statement":"T0.4: Materialism. All physical phenomena have physical causes. Causal closure is complete. \"Spooky\" correlations (entanglement, nonlocality) are real but do not transmit information superluminally and do not violate T0.2.","declared_grade":"constitutive","earned_grade":"constitutive","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: axiom","citation":{"source":"trellis.v4-16"}},"t1.1":{"id":"t1.1","kind":"primitive","label":"T1.1: Energy Conservation","statement":"T1.1: Energy Conservation. Energy is conserved in every closed system. Energy can change form but cannot be created or destroyed. Any calculation producing energy from nothing is wrong.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t1.2":{"id":"t1.2","kind":"primitive","label":"T1.2: Second Law","statement":"T1.2: Second Law. Entropy of an isolated system never decreases. Macroscopic processes are irreversible. Time has a thermodynamic arrow.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t1.3":{"id":"t1.3","kind":"primitive","label":"T1.3: Finite Energy Budgets","statement":"T1.3: Finite Energy Budgets. Physical processes cannot produce trans-Planckian energy outputs from sub-Planckian inputs. Any E = rho x V calculation yielding energies exceeding the rest mass of the progenitor system is automatically suspect. This is the Volume Bug filter: it catches errors of the form \"multiply a Planck-scale energy density by a macroscopic volume.\"","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t1.4":{"id":"t1.4","kind":"primitive","label":"T1.4: Information Processing Costs Energy","statement":"T1.4: Information Processing Costs Energy. Landauer's principle: erasing one bit of information dissipates at least kT ln 2 of energy. Information processing is a physical process subject to T1.1 and T1.2. The vacuum, if it processes information, pays these costs.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t1.5":{"id":"t1.5","kind":"primitive","label":"T1.5: Null Energy Condition","statement":"T1.5: Null Energy Condition. For any null vector k^mu, T_{mu nu} k^mu k^nu >= 0 for all physically realizable matter. Violations signal ghost instabilities (kinetic term sign flip), vacuum decay, or missing physics.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t1.6":{"id":"t1.6","kind":"primitive","label":"T1.6: Causal Locality","statement":"T1.6: Causal Locality. Information propagates at most at c. No instantaneous global effects. A theory that requires a macroscopic spatially extended system to respond as a single monolithic quantum gate violates this. This is the filter that catches naive Margolus-Levitin applications.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.1":{"id":"t2.1","kind":"primitive","label":"T2.1: Unitarity","statement":"T2.1: Unitarity. The S-matrix is unitary. Probability is conserved. No information is destroyed in principle (though it may become practically inaccessible).","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.2":{"id":"t2.2","kind":"primitive","label":"T2.2: Ghost Freedom","statement":"T2.2: Ghost Freedom. All propagating degrees of freedom have positive-definite kinetic terms. Negative kinetic energy (ghosts) renders the vacuum unstable to runaway pair production. Any construction must demonstrate ghost freedom through explicit DOF counting.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.3":{"id":"t2.3","kind":"primitive","label":"T2.3: Correct DOF Counting","statement":"T2.3: Correct DOF Counting. The number of propagating degrees of freedom must be established by rigorous Hamiltonian constraint analysis (Dirac-Bergmann algorithm), not by counting fields. Constrained systems (gauge theories, gravity) always have fewer DOF than naive field counting suggests.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.4":{"id":"t2.4","kind":"primitive","label":"T2.4: Diffeomorphism Invariance","statement":"T2.4: Diffeomorphism Invariance. The laws of physics take the same form in all coordinate systems. Any coupling to the gravitational sector must be expressible in a generally covariant form. State-dependent couplings (such as v = v(F_Q)) require explicit demonstration that F_Q transforms as a scalar under diffeomorphisms.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.5":{"id":"t2.5","kind":"primitive","label":"T2.5: GR Recovery","statement":"T2.5: GR Recovery. Any modification of gravity must reduce exactly to General Relativity in the appropriate limit (weak field, incoherent matter, low density). The gravitational constant G_N must be constant and universal in this limit.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.6":{"id":"t2.6","kind":"primitive","label":"T2.6: Observational Compatibility","statement":"T2.6: Observational Compatibility. Existing precision measurements (NICER radii, LIGO tidal deformability, GW170817, Shapiro delay masses, Cas A cooling, RHIC viscosity, short-range gravity tests, atomic clock constraints) must be respected. Predictions contradicting established observations at the relevant precision constitute kills.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.precision-gravity-tests-t2-6"}},"t2.7":{"id":"t2.7","kind":"primitive","label":"T2.7: Conformal Invariance of Gauge Kinetic Terms","statement":"T2.7: Conformal Invariance of Gauge Kinetic Terms. The Maxwell action sqrt(-g) F^{mu nu} F_{mu nu} is conformally invariant in 4D. This is a theorem of 4D field theory, independent of any specific model. Any gauge field localized on a 3-brane in AdS_5 has a tree-level coupling constant independent of brane position, because the AdS_5 warp factor is a conformal rescaling of the 4D induced metric. This structural boundary establishes that the framework cannot modify electromagnetic couplings through any tree-level geometric channel.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.8":{"id":"t2.8","kind":"primitive","label":"T2.8: Higgs Identity","statement":"T2.8: Higgs Identity. Different Higgs fields in different sectors of the theory must not be conflated. The SO(1,4) gravitational Higgs (which sets M_{Pl,eff}) is the gravitational symmetry-breaking scale. It couples to the electron mass, Bohr radius, and pycnonuclear screening at zero strength at tree level. This filter catches the most common error in external analyses of the framework.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"t2.9":{"id":"t2.9","kind":"primitive","label":"T2.9: Semiclassical Causality","statement":"T2.9: Semiclassical Causality. The state-dependent coupling v = v(F_Q) must preserve the causal structure of spacetime. The matter sector evolves via standard linear quantum mechanics. The gravitational background responds to the quantum state through semiclassical backreaction, analogous to G_{mu nu} = 8 pi <T_{mu nu}>_ren. The no-signaling theorem for linear QM guarantees that F_Q evaluated from the local reduced density matrix is invariant under spacelike-separated operations. Any construction where the metric depends on the un-traced global density matrix violates special relativity via the Gisin-Polchinski theorem and is rejected. The coupling v(F_Q) is evaluated from the local reduced state on the causal diamond; Donnelly-Freidel edge modes ensure this evaluation is foliation-independent but do not independently enforce causality. All effective action computations deriving the state-dependent coupling must employ the Schwinger-Keldysh Closed Time Path (CTP) formalism, which natively enforces retarded boundary conditions (G_R(x,y) = 0 for spacelike separations) through the forward/backward time-branch structure. The coincidence-limit reduction of the heat kernel to the a_4(x) contact term renders the coupling strictly local. This is a theorem of the construction, not an additional assumption.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"lit.standard-physics-t1t2"}},"b1":{"id":"b1","kind":"observation","label":"B1: Singularities","statement":"B1: Singularities. GR predicts geodesic incompleteness at black hole interiors and the Big Bang. Physical quantities (density, curvature) diverge. This signals the breakdown of the classical theory.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B1: Singularities. GR predicts geodesic incompleteness at black hole interiors and the Big Bang. Physical quantities (density, curvature) diverge. This signals the breakdown of the classical theory."},"b2":{"id":"b2","kind":"observation","label":"B2: Dark Energy","statement":"B2: Dark Energy. The cosmological constant Lambda exists and drives accelerating expansion. Its value (~10^-122 in Planck units) is unexplained. DESI 2024-2025 BAO data (DR1 + DR2) prefers evolving dark energy (w0 ~ -0.7, wa ~ -1.0) at 2.8-sigma to 4.2-sigma over static Lambda-CDM, depending on the supernovae compilation utilized (2.8-sigma floor from DESI + CMB + Pantheon+; 4.2-sigma ceiling from DESI + CMB + DESY5), suggesting Lambda may evolve.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B2: Dark Energy. The cosmological constant Lambda exists and drives accelerating expansion. Its value (~10^-122 in Planck units) is unexplained. DESI 2024-2025 BAO data (DR1 + DR2) prefers evolving dark energy (w0 ~ -0.7, wa ~ -1.0) at 2.8-sigma to 4.2-sigma over static Lambda-CDM, depending on the supernovae compilation utilized (2.8-sigma floor from DESI + CMB + Pantheon+; 4.2-sigma ceiling from DESI + CMB + DESY5), suggesting Lambda may evolve."},"b3":{"id":"b3","kind":"observation","label":"B3: Dark Matter","statement":"B3: Dark Matter. 85% of the gravitational mass of the universe is unaccounted for by the Standard Model. Rotation curves, lensing, CMB anisotropy, and large-scale structure all require it. Its particle identity is unknown.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B3: Dark Matter. 85% of the gravitational mass of the universe is unaccounted for by the Standard Model. Rotation curves, lensing, CMB anisotropy, and large-scale structure all require it. Its particle identity is unknown."},"b4":{"id":"b4","kind":"observation","label":"B4: Black Hole Information Paradox","statement":"B4: Black Hole Information Paradox. Hawking radiation appears to destroy information (violating T2.1), yet the horizon is locally smooth. Resolution requires understanding the microstructure of horizons.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B4: Black Hole Information Paradox. Hawking radiation appears to destroy information (violating T2.1), yet the horizon is locally smooth. Resolution requires understanding the microstructure of horizons."},"b5":{"id":"b5","kind":"observation","label":"B5: Cosmological Constant Problem","statement":"B5: Cosmological Constant Problem. Quantum field theory predicts a vacuum energy ~10^120 times larger than observed. The cancellation mechanism is unknown.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B5: Cosmological Constant Problem. Quantum field theory predicts a vacuum energy ~10^120 times larger than observed. The cancellation mechanism is unknown."},"b6":{"id":"b6","kind":"observation","label":"B6: Hierarchy Problem","statement":"B6: Hierarchy Problem. The electroweak scale (M_EW ~ 10^2 GeV) is 10^16 times smaller than the Planck scale (M_Pl ~ 10^19 GeV). No mechanism within the SM protects this hierarchy from radiative corrections.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B6: Hierarchy Problem. The electroweak scale (M_EW ~ 10^2 GeV) is 10^16 times smaller than the Planck scale (M_Pl ~ 10^19 GeV). No mechanism within the SM protects this hierarchy from radiative corrections."},"b7":{"id":"b7","kind":"observation","label":"B7: No Quantum Gravity","statement":"B7: No Quantum Gravity. The Standard Model and General Relativity are mutually incompatible at energies approaching M_Pl. Perturbative quantization of GR is non-renormalizable.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B7: No Quantum Gravity. The Standard Model and General Relativity are mutually incompatible at energies approaching M_Pl. Perturbative quantization of GR is non-renormalizable."},"b8":{"id":"b8","kind":"observation","label":"B8: Neutrino Masses","statement":"B8: Neutrino Masses. Neutrinos have mass (oscillation experiments), but the SM does not predict this. The mass generation mechanism is unknown.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B8: Neutrino Masses. Neutrinos have mass (oscillation experiments), but the SM does not predict this. The mass generation mechanism is unknown."},"b9":{"id":"b9","kind":"observation","label":"B9: Matter-Antimatter Asymmetry","statement":"B9: Matter-Antimatter Asymmetry. The universe is matter-dominated. The SM does not contain sufficient CP violation to produce the observed baryon asymmetry.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B9: Matter-Antimatter Asymmetry. The universe is matter-dominated. The SM does not contain sufficient CP violation to produce the observed baryon asymmetry."},"b10":{"id":"b10","kind":"observation","label":"B10: Hubble Tension","statement":"B10: Hubble Tension. Local H0 measurements (~73 km/s/Mpc from distance ladder) disagree with CMB-inferred H0 (~67 km/s/Mpc from Planck) at ~5-sigma.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B10: Hubble Tension. Local H0 measurements (~73 km/s/Mpc from distance ladder) disagree with CMB-inferred H0 (~67 km/s/Mpc from Planck) at ~5-sigma."},"b11":{"id":"b11","kind":"observation","label":"B11: sigma8 Tension","statement":"B11: sigma8 Tension. Weak lensing surveys measure less matter clustering than Planck CMB predicts, at ~2 to 3-sigma.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B11: sigma8 Tension. Weak lensing surveys measure less matter clustering than Planck CMB predicts, at ~2 to 3-sigma."},"b12":{"id":"b12","kind":"observation","label":"B12: LUNA Screening Anomaly","statement":"B12: LUNA Screening Anomaly. Enhanced electron screening in d+d fusion in metallic targets exceeds linear Thomas-Fermi predictions by 10 to 30x. Anomaly correlates with conductor/insulator status, not lattice coherence. On-resonance laser stimulation amplifies the effect at specific phonon frequencies.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B12: LUNA Screening Anomaly. Enhanced electron screening in d+d fusion in metallic targets exceeds linear Thomas-Fermi predictions by 10 to 30x. Anomaly correlates with conductor/insulator status, not lattice coherence. On-resonance laser stimulation amplifies the effect at specific phonon frequencies."},"b13":{"id":"b13","kind":"observation","label":"B13: Hyperon Puzzle","statement":"B13: Hyperon Puzzle. Standard nuclear physics predicts that hyperons appear in neutron star cores at ~2 rho_0, softening the EOS and limiting M_max to ~1.6 to 1.8 M_sun. Yet pulsars exist at 2.08 M_sun (PSR J0740+6620) and 2.35 M_sun (PSR J0952-0607). Additional stiffness is required.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B13: Hyperon Puzzle. Standard nuclear physics predicts that hyperons appear in neutron star cores at ~2 rho_0, softening the EOS and limiting M_max to ~1.6 to 1.8 M_sun. Yet pulsars exist at 2.08 M_sun (PSR J0740+6620) and 2.35 M_sun (PSR J0952-0607). Additional stiffness is required."},"b14":{"id":"b14","kind":"observation","label":"B14: Lower Mass Gap","statement":"B14: Lower Mass Gap. Compact objects in the 2.5 to 5 M_sun range are anomalously rare. The gap separates the heaviest neutron stars from the lightest black holes. LIGO O3/O4 detections (GW190814, GW230529) are beginning to populate this region, preferentially from binary/merger channels.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B14: Lower Mass Gap. Compact objects in the 2.5 to 5 M_sun range are anomalously rare. The gap separates the heaviest neutron stars from the lightest black holes. LIGO O3/O4 detections (GW190814, GW230529) are beginning to populate this region, preferentially from binary/merger channels."},"b15":{"id":"b15","kind":"observation","label":"B15: Failed Supernovae","statement":"B15: Failed Supernovae. Some massive stars (~17+ M_sun) appear to vanish without explosion. N6946-BH1 (25 M_sun RSG) produced only a faint ~10^47 erg transient and disappeared, confirmed by JWST. Standard neutrino-driven explosion mechanisms fail for high-compactness cores.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B15: Failed Supernovae. Some massive stars (~17+ M_sun) appear to vanish without explosion. N6946-BH1 (25 M_sun RSG) produced only a faint ~10^47 erg transient and disappeared, confirmed by JWST. Standard neutrino-driven explosion mechanisms fail for high-compactness cores."},"b16":{"id":"b16","kind":"observation","label":"B16: CMB Cold Spot","statement":"B16: CMB Cold Spot. The Eridanus supervoid (20% underdense) aligns with an anomalous CMB cold spot. Standard Lambda-CDM ISW predictions undershoot the observed temperature deficit. DES Y3 data shows 30% weaker lensing from this void.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B16: CMB Cold Spot. The Eridanus supervoid (20% underdense) aligns with an anomalous CMB cold spot. Standard Lambda-CDM ISW predictions undershoot the observed temperature deficit. DES Y3 data shows 30% weaker lensing from this void."},"b17":{"id":"b17","kind":"observation","label":"B17: The Measurement Problem and the Gran Sasso Falsification","statement":"B17: The Measurement Problem and the Gran Sasso Falsification. Quantum mechanics lacks a physical criterion separating the unitary regime of superposition from the classical regime of macroscopic definiteness. The Penrose-Diosi (DP) model provides the most physically motivated objective collapse theory, attributing wavefunction reduction to gravitational self-energy of the superposed mass distribution: tau_DP ~ hbar/Delta E_G. However, the standard DP collapse dynamics generate continuous stochastic momentum diffusion on charged particles, producing a calculable spectrum of spontaneous X-ray bremsstrahlung (dGamma/dE ~ 1/E, scaling as R0^-3). In 2021, a dedicated experiment at the Laboratori Nazionali del Gran Sasso (Donadi et al., Nature Physics 2021) using a high-purity germanium detector in the 10 to 100 keV range detected zero anomalous radiation, establishing a lower bound R0 >~ 0.54e-10 m. This is three orders of magnitude above the natural nuclear-scale cutoff (R0 ~ 10^-15 m) required for macroscopic localization, falsifying the parameter-free DP model as formulated in 4D. If gravity induces objective collapse, the energy of state reduction must dissipate through a channel invisible to 4D electromagnetism.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B17: The Measurement Problem and the Gran Sasso Falsification. Quantum mechanics lacks a physical criterion separating the unitary regime of superposition from the classical regime of macroscopic definiteness. The Penrose-Diosi (DP) model provides the most physically motivated objective collapse theory, attributing wavefunction reduction to gravitational self-energy of the superposed mass distribution: tau_DP ~ hbar/Delta E_G. However, the standard DP collapse dynamics generate continuous stochastic momentum diffusion on charged particles, producing a calculable spectrum of spontaneous X-ray bremsstrahlung (dGamma/dE ~ 1/E, scaling as R0^-3). In 2021, a dedicated experiment at the Laboratori Nazionali del Gran Sasso (Donadi et al., Nature Physics 2021) using a high-purity germanium detector in the 10 to 100 keV range detected zero anomalous radiation, establishing a lower bound R0 >~ 0.54e-10 m. This is three orders of magnitude above the natural nuclear-scale cutoff (R0 ~ 10^-15 m) required for macroscopic localization, falsifying the parameter-free DP model as formulated in 4D. If gravity induces objective collapse, the energy of state reduction must dissipate through a channel invisible to 4D electromagnetism."},"b18":{"id":"b18","kind":"observation","label":"B18: SN 2024afav Chirp Anomaly","statement":"B18: SN 2024afav Chirp Anomaly. The superluminous supernova SN 2024afav (z = 0.0724, Mc ~ -20.7) exhibits a quasi-periodic, accelerating chirp in its post-peak electromagnetic light curve, attributed by Farah et al. (Nature 2026) to Lense-Thirring precession of a misaligned accretion disk around a newborn magnetar (P = 4.2 +/- 0.2 ms, B = 1.6 +/- 0.1e14 G). Seven distinct brightness bumps span 175 days. The temporal intervals between bumps accelerate from 42.4 days to 16.1 days (Phase 0 to +109), consistent with a contracting accretion disk. At Phase +109, the interval abruptly doubles to 32.1 days, producing a >5.8-sigma deviation from the smooth viscous power-law baseline predicted by standard alpha-disk models. This deceleration is coincident with the spectroscopic emergence of lower-ionization [O II] + [Ca II] 7300 A emission and a weakening of early [O III] features. The standard LT model accommodates the gross periodicity but the discontinuous deceleration and the correlated ionization shift remain unexplained. The anomaly is open.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B18: SN 2024afav Chirp Anomaly. The superluminous supernova SN 2024afav (z = 0.0724, Mc ~ -20.7) exhibits a quasi-periodic, accelerating chirp in its post-peak electromagnetic light curve, attributed by Farah et al. (Nature 2026) to Lense-Thirring precession of a misaligned accretion disk around a newborn magnetar (P = 4.2 +/- 0.2 ms, B = 1.6 +/- 0.1e14 G). Seven distinct brightness bumps span 175 days. The temporal intervals between bumps accelerate from 42.4 days to 16.1 days (Phase 0 to +109), consistent with a contracting accretion disk. At Phase +109, the interval abruptly doubles to 32.1 days, producing a >5.8-sigma deviation from the smooth viscous power-law baseline predicted by standard alpha-disk models. This deceleration is coincident with the spectroscopic emergence of lower-ionization [O II] + [Ca II] 7300 A emission and a weakening of early [O III] features. The standard LT model accommodates the gross periodicity but the discontinuous deceleration and the correlated ionization shift remain unexplained. The anomaly is open."},"b19":{"id":"b19","kind":"observation","label":"B19: Exotic Stellar Cooling Anomaly","statement":"B19: Exotic Stellar Cooling Anomaly. The pulsating white dwarf G117-B15A exhibits a secular period drift P_dot_obs = (5.12 +/- 0.82)e-15 s/s for its 215.2 s fundamental mode, measured over a 50-year baseline. Standard gravothermal models predict P_dot_th ~ 1.25e-15 s/s. The discrepancy corresponds to an anomalous missing luminosity of ~10^32 erg/s. The neutron star in Cassiopeia A exhibits a ~2% to 4% surface temperature decline over a 10 to 18 year Chandra baseline, exceeding modified Urca predictions (~0.2% to 0.3% per decade). Mainstream attributions invoke DFSZ axion emission (m_a cos^2(beta) ~ 17.4 meV) or enhanced Cooper-pair breaking neutrinos. The axion parameter space required for these attributions (g_a-gamma-gamma ~ 1e-11 GeV^-1, g_aee ~ 1e-13) is under severe multi-modal observational pressure.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"observation","data":{}},"children":[],"world_value":"B19: Exotic Stellar Cooling Anomaly. The pulsating white dwarf G117-B15A exhibits a secular period drift P_dot_obs = (5.12 +/- 0.82)e-15 s/s for its 215.2 s fundamental mode, measured over a 50-year baseline. Standard gravothermal models predict P_dot_th ~ 1.25e-15 s/s. The discrepancy corresponds to an anomalous missing luminosity of ~10^32 erg/s. The neutron star in Cassiopeia A exhibits a ~2% to 4% surface temperature decline over a 10 to 18 year Chandra baseline, exceeding modified Urca predictions (~0.2% to 0.3% per decade). Mainstream attributions invoke DFSZ axion emission (m_a cos^2(beta) ~ 17.4 meV) or enhanced Cooper-pair breaking neutrinos. The axion parameter space required for these attributions (g_a-gamma-gamma ~ 1e-11 GeV^-1, g_aee ~ 1e-13) is under severe multi-modal observational pressure."},"t3.1":{"id":"t3.1","kind":"assumption","label":"T3.1: String/M-Theory as Consistent UV Completion","statement":"T3.1: String/M-Theory as Consistent UV Completion. String theory provides a mathematically consistent framework for quantum gravity. Its landscape of solutions may or may not describe our universe, but its internal consistency is well-established.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"t3.2":{"id":"t3.2","kind":"assumption","label":"T3.2: Swampland Constraints","statement":"T3.2: Swampland Constraints. Not all effective field theories can be UV-completed into quantum gravity. The Swampland program (Vafa 2005, Ooguri-Vafa 2007) identifies constraints that separate the \"landscape\" (consistent) from the \"swampland\" (inconsistent). Key conjectures: Distance Conjecture (traversing infinite distances in moduli space produces infinite towers of exponentially light states), TCC (cosmological fluctuations cannot be trans-Planckian), dS Conjecture (stable de Sitter vacua may not exist in quantum gravity).","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"t3.3":{"id":"t3.3","kind":"assumption","label":"T3.3: Holographic Principle","statement":"T3.3: Holographic Principle. The degrees of freedom of a region of space scale with its boundary area, not its volume (Bekenstein bound, Ryu-Takayanagi formula). The AdS/CFT correspondence provides the most rigorously established non-perturbative formulation of quantum gravity.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"t3.4":{"id":"t3.4","kind":"assumption","label":"T3.4: Species Scale is Dynamical","statement":"T3.4: Species Scale is Dynamical. The effective UV cutoff of quantum gravity depends on the spectrum of light states accessible at a given point in moduli space (Dvali 2010, van de Heisteeg-Vafa-Wiesner-Wu 2023). The Species Scale responds to the state of the matter sector through the spectrum it counts.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"t3.5":{"id":"t3.5","kind":"assumption","label":"T3.5: Dark Dimension Scenario","statement":"T3.5: Dark Dimension Scenario. One mesoscopic extra dimension with radius R_Dark ~ micron produces a KK tower beginning at m_KK ~ 1e-3 eV (Montero, Vafa, Valenzuela 2023). The fundamental 5D Planck mass is M_5 ~ 2.6e8 GeV. This scenario connects the cosmological constant to the size of the extra dimension via R_Dark ~ Lambda^(-1/4).","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"t3.6":{"id":"t3.6","kind":"assumption","label":"T3.6: Pre-Geometric Topological Quantization of Lambda [v4","statement":"T3.6: Pre-Geometric Topological Quantization of Lambda [v4.8, branch-conditional v4.14]. The MacDowell-Mansouri SSB action generates a Gauss-Bonnet term whose coupling alpha_GB = -4 Y_MM v acts as a gravitational theta-angle in the path integral. Periodicity of theta mod 2pi forces the cosmological constant into discrete topological sectors Lambda^(k) labeled by integer k, with the master relation 3 c M_P^2/(32 Lambda^(k)) = -theta^(0) + 2 pi k where c = 128 pi^2. The observed hierarchy M_P^2/Lambda ~ 10^120 corresponds to k ~ S_dS, the de Sitter entropy. Inter-sector tunneling is suppressed by e^(-S_dS). Reference: Addazi-Meluccio 2026 (arXiv:2602.16840). The framework's adoption of this mechanism is conditional on T4 reformulation of the SSB potential to the periodic Addazi-Meluccio form. T3.6 is the framework's Path A commitment: current working hypothesis, retained as long as DESI thawing remains below 5-sigma.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"t3.6prime":{"id":"t3.6prime","kind":"assumption","label":"T3.6' (Path B, prepared contingency, v4.14): Evolving Dark Dimension Cosmology. ...","statement":"T3.6' (Path B, prepared contingency, v4.14): Evolving Dark Dimension Cosmology. Lambda is set geometrically by the Dark Dimension radius: Lambda ~ R^-4 with R ~ micron. The smallness of Lambda derives from R being mesoscopic rather than from topological quantization. R(t) evolves cosmologically, driven by slow-roll of a separate light modulus chi with m_chi ~ H0 ~ 1e-33 eV. Equation of state w(z) != -1 with thawing or freezing behavior matching the DESI DR2 signature in the Bedroya-Vafa class. T3.6' is dormant under v4.14 (Path A is the current working hypothesis) but discharge-ready per LINT-PATH-1. Reference: Bedroya-Obied-Vafa-Wu arXiv:2507.03090.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"assumption","data":{}},"children":[],"position":"hypothesis"},"cc1.v4-14":{"id":"cc1.v4-14","kind":"transformation","label":"CC-1 (Core Claim, v4.14): Gravity couples to the modular-Hamiltonian Fisher informat","statement":"CC-1 (Core Claim, v4.14): Gravity couples to the modular-Hamiltonian Fisher information of the matter sector via the state-dependent VEV v(F_Q) of the SO(1,4) gravitational Higgs, with super-extensive O(N^2) scaling for ODLRO matter states. The coupling exhibits a pole structure at F_Q,crit that produces qualitatively distinct gravitational responses below and above threshold. This is the framework central theoretical claim and its most distinctive structural contribution.","declared_grade":"asserted","earned_grade":"asserted","status":"superseded","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["cc1.v4-14"],"composition":"none","function":"derive","math":"CC-1 (Core Claim, v4.14): Gravity couples to the modular-Hamiltonian Fisher information of the matter sector via the state-dependent VEV v(F_Q) of the SO(1,4) gravitational Higgs, with super-extensive O(N^2) scaling for ODLRO matter states. The coupling exhibits a pole structure at F_Q,crit that produces qualitatively distinct gravitational responses below and above threshold. This is the framework central theoretical claim and its most distinctive structural contribution.","formal_status":"nl","load_bearing":true},"cc1.v4-16":{"id":"cc1.v4-16","kind":"transformation","label":"CC-1 annotation (v4.16, supersedes the v4.14 statement). CC-1 is demoted from fo...","statement":"CC-1 annotation (v4.16, supersedes the v4.14 statement). CC-1 is demoted from foregrounded core to conditional structure: the pole is real and dormant in every known matter environment, with its confirmed activation domain being horizon-scale physics. The coupling functional is reidentified: geometry does not read F_Q as a first-order source; it reads the modular free energy W(epsilon) = log<e^(-epsilon K)>, whose first cumulant <K> (modular energy, an integral of T_mu_nu by Bisognano-Wichmann) is the source and whose second cumulant <delta K^2> = F_Q is the stiffness controlling the pole. The corrected one-line identity: gravity couples to the modular free energy of the matter sector through the state-dependent SO(1,4) Higgs VEV; the source is modular energy, the stiffness is the modular variance (equal to QFI), and the pole at F_Q,crit marks local symmetry restoration to the pre-geometric phase.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["cc1.v4-16"],"composition":"none","function":"derive","math":"CC-1 annotation (v4.16, supersedes the v4.14 statement). CC-1 is demoted from foregrounded core to conditional structure: the pole is real and dormant in every known matter environment, with its confirmed activation domain being horizon-scale physics. The coupling functional is reidentified: geometry does not read F_Q as a first-order source; it reads the modular free energy W(epsilon) = log<e^(-epsilon K)>, whose first cumulant <K> (modular energy, an integral of T_mu_nu by Bisognano-Wichmann) is the source and whose second cumulant <delta K^2> = F_Q is the stiffness controlling the pole. The corrected one-line identity: gravity couples to the modular free energy of the matter sector through the state-dependent SO(1,4) Higgs VEV; the source is modular energy, the stiffness is the modular variance (equal to QFI), and the pole at F_Q,crit marks local symmetry restoration to the pre-geometric phase.","formal_status":"nl","load_bearing":true},"k1":{"id":"k1","kind":"transformation","label":"K1: Two-Channel Decomposition [from Tier 4","statement":"K1: Two-Channel Decomposition [from Tier 4.4 + positivity of T_3]. The brane stress-energy decomposes exactly into: (i) Trace channel (radial/curvature), which scales as N, sources Ricci curvature, and IS gravity; (ii) Traceless antisymmetric channel (angular/torsion), which scales as f^2 N^2 for coherent matter and sources torsion via the Cartan equation. This decomposition is an algebraic theorem of the SO(1,4) to SO(1,3) breaking pattern. Lifted to checked (landing-1 Track 3): its own conjunctive co-premise K3 (now K3-prime, independently-rechecked) no longer caps this claim's support delivery below the corroborated threshold the two-row rule needs to let K1's own Stage 3b checking record (checker:gemini-dr) stand on its own.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"transformation","data":{}},"children":["k3-prime2"],"role":"DG kind: derivation","takes":["k3-prime2"],"produces":["k1"],"composition":"none","function":"derive","math":"K1: Two-Channel Decomposition [from Tier 4.4 + positivity of T_3]. The brane stress-energy decomposes exactly into: (i) Trace channel (radial/curvature), which scales as N, sources Ricci curvature, and IS gravity; (ii) Traceless antisymmetric channel (angular/torsion), which scales as f^2 N^2 for coherent matter and sources torsion via the Cartan equation. This decomposition is an algebraic theorem of the SO(1,4) to SO(1,3) breaking pattern. Lifted to checked (landing-1 Track 3): its own conjunctive co-premise K3 (now K3-prime, independently-rechecked) no longer caps this claim's support delivery below the corroborated threshold the two-row rule needs to let K1's own Stage 3b checking record (checker:gemini-dr) stand on its own.","formal_status":"nl","load_bearing":true},"k2":{"id":"k2","kind":"transformation","label":"K2: G = G_N Always [from K1 + T2","statement":"K2: G = G_N Always [from K1 + T2.5]. The radial channel couples to all mass-energy with constant G = G_N = 1/(8 pi v^2). Coherence (F_Q ~ N^2) enters only the angular channel, sourcing torsion. The gravitational constant is never amplified, modified, or state-dependent. Any analysis routing F_Q through G_eff is using the wrong channel.","declared_grade":"asserted","earned_grade":"asserted","status":"in-force","presentation":{"type":"transformation","data":{}},"children":["k1","t2.5"],"role":"DG kind: derivation","takes":["k1","t2.5"],"produces":["k2"],"composition":"conjunction","function":"derive","math":"K2: G = G_N Always [from K1 + T2.5]. The radial channel couples to all mass-energy with constant G = G_N = 1/(8 pi v^2). Coherence (F_Q ~ N^2) enters only the angular channel, sourcing torsion. The gravitational constant is never amplified, modified, or state-dependent. Any analysis routing F_Q through G_eff is using the wrong channel.","formal_status":"nl","load_bearing":true},"im.israel-1966-junction":{"id":"im.israel-1966-junction","kind":"primitive","label":"The Israel junction condition, trace-reversed form, Z2-orbifold-reduced (Israel ...","statement":"The Israel junction condition, trace-reversed form, Z2-orbifold-reduced (Israel 1966): across a codimension-one brane with unit normal n^M and induced metric gamma_mu_nu, [K_mu_nu] - [K] gamma_mu_nu = kappa_5^2 S_mu_nu, where [X] = X+ - X- across the brane and S_mu_nu is the brane's own stress tensor. Under a Z2 orbifold symmetry (K-_mu_nu = -K+_mu_nu) this reduces to the one-sided, trace-reversed form K+_mu_nu = -(kappa_5^2/2)(S_mu_nu - (1/3) S gamma_mu_nu). This is the master junction relation both K3 audit artifacts (PK-AUD-K3-001, PK-AUD-K3-002) independently rederive before applying it to a pure-tension brane (S_mu_nu = -T_3 gamma_mu_nu) to obtain every tension-position relation the imports below carry.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"PK-AUD-K3-001: Conventions Block (unlabeled Israel-condition statement) and eq. (C1). PK-AUD-K3-002: Section 2, Conventions block (trace-reversed form given directly, unlabeled)."}},"im.rs1999-critical-tension":{"id":"im.rs1999-critical-tension","kind":"primitive","label":"The Randall-Sundrum critical brane tension, flat-sliced case (Randall, Sundrum 1...","statement":"The Randall-Sundrum critical brane tension, flat-sliced case (Randall, Sundrum 1999): for a Z2-orbifold brane at the boundary of a flat-sliced (Poincare/Minkowski-sliced) AdS5 bulk of curvature radius L, the Israel junction condition forces the tension to the critical value T_3 = 6/(kappa_5^2 L), exactly, with no dependence on the brane's own position (a pure gauge freedom in the flat-sliced case, since translating the brane along the warped direction changes nothing). Both K3 audit artifacts independently rederive this as the ε=0 boundary case of their own more general warped-product treatment.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"PK-AUD-K3-001: Q1(a), boxed result. PK-AUD-K3-002: Section 3.1, eq. following specialization of (*) to ε=0."}},"im.karch-randall-2001-tension-position":{"id":"im.karch-randall-2001-tension-position","kind":"primitive","label":"The Karch-Randall AdS4-sliced tension-position relation and its dS4-sliced mirro...","statement":"The Karch-Randall AdS4-sliced tension-position relation and its dS4-sliced mirror (Karch, Randall 2001): for a Z2-orbifold brane at position z_0 (equivalently u_b = z_0/L) in an AdS4-sliced AdS5 bulk of curvature radius L, the Israel junction condition gives T_3 = (6/kappa_5^2 L) tanh(z_0/L), strictly below the RS critical value, recovering it only in the flat-slicing limit z_0/L to infinity. Continuing the same construction to a dS4-sliced bulk (supercritical tension, no static AdS4-sliced solution) gives the mirror relation T_3 = (6/kappa_5^2 L) coth(z_0/L). Both relations are one continuous family in the slicing-curvature sign, not two separate literature results; both K3 audit artifacts derive them independently from the Israel junction condition above, applied to the Karch-Randall brane.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"PK-AUD-K3-001: Q1(b), boxed result (AdS4-sliced case only; the dS4 mirror is not separately derived in this artifact). PK-AUD-K3-002: Section 3.2, eq. (KR-1)/(KR-2) for the AdS4-sliced case, Properties list for the dS4-sliced continuation."}},"im.goldberger-wise-effective-tension":{"id":"im.goldberger-wise-effective-tension","kind":"primitive","label":"Brane-localized vacuum energy gravitates as tension (Goldberger, Wise 1999; DeWo...","statement":"Brane-localized vacuum energy gravitates as tension (Goldberger, Wise 1999; DeWolfe, Freedman, Gubser, Karch 2000): for a brane hosting a scalar field with a homogeneous vacuum expectation value v, the scalar's own potential energy V(v) enters the Israel junction condition indistinguishably from the bare tension T_3, so the junction condition constrains only the effective tension T_eff = T_3 + V(v), never the bare T_3 alone. Any state-dependence of v therefore backreacts on the brane's own position and induced geometry through T_eff, not through T_3 in isolation. Both K3 audit artifacts derive this by adding the scalar's stress tensor to the brane action and re-deriving the junction condition.","declared_grade":"checked","earned_grade":"checked","status":"in-force","presentation":{"type":"primitive","data":{}},"children":[],"role":"DG kind: standard-result","citation":{"source":"PK-AUD-K3-001: Q4, first bullet (T_eff = T3 + V(v), derived without naming Goldberger-Wise/DeWolfe directly). PK-AUD-K3-002: Section 6, eq. (EFF), citing [6] Goldberger-Wise 1999 and [7] DeWolfe et al. 2000 by name."}},"k3":{"id":"k3","kind":"transformation","label":"K3: T_3 is Constant [from Tier 4","statement":"K3: T_3 is Constant [from Tier 4.2]. The DBI brane tension T_3 = 6/(kappa_5^2 L) is fixed by the Israel junction conditions, independent of brane position z_0. State-dependence lives in the Higgs VEV v(F_Q), not in T_3.","declared_grade":"asserted","earned_grade":"asserted","status":"superseded","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["k3"],"composition":"none","function":"derive","math":"K3: T_3 is Constant [from Tier 4.2]. The DBI brane tension T_3 = 6/(kappa_5^2 L) is fixed by the Israel junction conditions, independent of brane position z_0. State-dependence lives in the Higgs VEV v(F_Q), not in T_3.","formal_status":"nl","load_bearing":true},"k3-prime":{"id":"k3-prime","kind":"transformation","label":"K3-prime: brane tension, criticality, and the modulus","statement":"K3-prime: brane tension, criticality, and the modulus. (i) In the flat-sliced Poincare background of Paper 0 eq. 2, the Israel junction conditions pin the tension to the critical value T3 = 6/(kappa5^2 L), independent of z0; the content of that independence is that z0 is a modulus, a flat direction the junction conditions do not lift, which is why the radion exists and is stabilized by other sectors of the framework. (ii) In the physical dS-sliced background (static positive Lambda^(k)), the effective tension is locked to the position as T_eff = (6/kappa5^2 L) coth(z0/L), supercritical, with relative deviation from critical of order (L/l_dS)^2, approximately 10^-64; z0's flat direction is tilted at that scale. (iii) The bare T3 is a fixed parameter of the brane action and no dynamical field varies it; state-dependence enters the embedding only through T_eff = T3 + V(v(F_Q)), with position sensitivity enhanced by cosh^2(z0/L), significant at the vacuum-energy scale |V| ~ 3L/(kappa5^2 l^2). Supersedes K3 (landing-1 Track 3): K3's own text elided the flat-versus-KR-versus-dS distinction (i)-(iii) now makes explicit, and elided the state-dependence channel (iii) that (i) alone does not foreclose.","declared_grade":"independently-rechecked","earned_grade":"independently-rechecked","status":"superseded","presentation":{"type":"transformation","data":{}},"children":[],"role":"DG kind: derivation","takes":[],"produces":["k3-prime"],"composition":"none","function":"derive","math":"K3-prime: brane tension, criticality, and the modulus. (i) In the flat-sliced Poincare background of Paper 0 eq. 2, the Israel junction conditions pin the tension to the critical value T3 = 6/(kappa5^2 L), independent of z0; the content of that independence is that z0 is a modulus, a flat direction the junction conditions do not lift, which is why the radion exists and is stabilized by other sectors of the framework. (ii) In the physical dS-sliced background (static positive Lambda^(k)), the effective tension is locked to the position as T_eff = (6/kappa5^2 L) coth(z0/L), supercritical, with relative deviation from critical of order (L/l_dS)^2, approximately 10^-64; z0's flat direction is tilted at that scale. (iii) The bare T3 is a fixed parameter of the brane action and no dynamical field varies it; state-dependence enters the embedding only through T_eff = T3 + V(v(F_Q)), with position sensitivity enhanced by cosh^2(z0/L), significant at the vacuum-energy scale |V| ~ 3L/(kappa5^2 l^2). Supersedes K3 (landing-1 Track 3): K3's own text elided the flat-versus-KR-versus-dS distinction (i)-(iii) now makes explicit, and elided the state-dependence channel (iii) that (i) alone does not foreclose.","formal_status":"nl","load_bearing":true},"k3-prime2":{"id":"k3-prime2","kind":"transformation","label":"K3-prime2: brane tension, criticality, and the modulus, part (iii) corrected (landing-2 Track B)","statement":"K3-prime2: brane tension, criticality, and the modulus, part (iii) corrected (landing-2 Track B). (i) In the flat-sliced Poincare background of Paper 0 eq. 2, the Israel junction conditions pin the tension to the critical value T3 = 6/(kappa5^2 L), independent of z0; the content of that independence is that z0 is a modulus, a flat direction the junction conditions do not lift, which is why the radion exists and is stabilized by other sectors of the framework. (ii) In the physical dS-sliced background (static positive Lambda^(k)), the effective tension is locked to the position as T_eff = (6/kappa5^2 L) coth(z0/L), supercritical, with relative deviation from critical of order (L/l_dS)^2, approximately 10^-64; z0's flat direction is tilted at that scale. (iii, corrected) The bare T3 is a fixed parameter of the brane action and no dynamical field varies it; state-dependence enters the embedding only through T_eff = T3 + V(v(F_Q)). The response coefficient is sinh^2(u_b), the arccoth derivative, with sign delta u_b = -(kappa_5^2 L / 6) sinh^2(u_b) delta V for delta V added to the brane tension: the identically equal form (kappa_5^2 L / 6)(T_c / T_eff)^2 cosh^2(u_b) shows the bare cosh^2 label was a 10^-64 relative discrepancy with an untracked sign. Significant at the vacuum-energy scale |V| ~ 3L/(kappa5^2 l^2). Supersedes K3-prime (landing-2 Track B, three convergent adversarial audits, docs/audits/PK-AUD-K3B-001.md, PK-AUD-K3B-002.pdf, PK-AUD-K3B-003.md): K3-prime's own part (iii) used cosh^2(z0/L) with an unstated sign; the correct coefficient for the supercritical dS-sliced branch (part ii's own coth junction law) is sinh^2(u_b), not cosh^2(u_b), a 10^-64 relative discrepancy at the framework's own working point but an untracked sign, not a rounding matter. Parts (i) and (ii) are unchanged from K3-prime; their own checking records carry forward.","declared_grade":"independently-rechecked","earned_grade":"independently-rechecked","status":"in-force","presentation":{"type":"transformation","data":{}},"children":["im.israel-1966-junction","im.rs1999-critical-tension","im.karch-randall-2001-tension-position","im.goldberger-wise-effective-tension"],"role":"DG kind: derivation","takes":["im.israel-1966-junction","im.rs1999-critical-tension","im.karch-randall-2001-tension-position","im.goldberger-wise-effective-tension"],"produces":["k3-prime2"],"composition":"conjunction","function":"derive","math":"K3-prime2: brane tension, criticality, and the modulus, part (iii) corrected (landing-2 Track B). (i) In the flat-sliced Poincare background of Paper 0 eq. 2, the Israel junction conditions pin the tension to the critical value T3 = 6/(kappa5^2 L), independent of z0; the content of that independence is that z0 is a modulus, a flat direction the junction conditions do not lift, which is why the radion exists and is stabilized by other sectors of the framework. (ii) In the physical dS-sliced background (static positive Lambda^(k)), the effective tension is locked to the position as T_eff = (6/kappa5^2 L) coth(z0/L), supercritical, with relative deviation from critical of order (L/l_dS)^2, approximately 10^-64; z0's flat direction is tilted at that scale. (iii, corrected) The bare T3 is a fixed parameter of the brane action and no dynamical field varies it; state-dependence enters the embedding only through T_eff = T3 + V(v(F_Q)). The response coefficient is sinh^2(u_b), the arccoth derivative, with sign delta u_b = -(kappa_5^2 L / 6) sinh^2(u_b) delta V for delta V added to the brane tension: the identically equal form (kappa_5^2 L / 6)(T_c / T_eff)^2 cosh^2(u_b) shows the bare cosh^2 label was a 10^-64 relative discrepancy with an untracked sign. Significant at the vacuum-energy scale |V| ~ 3L/(kappa5^2 l^2). Supersedes K3-prime (landing-2 Track B, three convergent adversarial audits, docs/audits/PK-AUD-K3B-001.md, PK-AUD-K3B-002.pdf, PK-AUD-K3B-003.md): K3-prime's own part (iii) used cosh^2(z0/L) with an unstated sign; the correct coefficient for the supercritical dS-sliced branch (part ii's own coth junction law) is sinh^2(u_b), not cosh^2(u_b), a 10^-64 relative discrepancy at the framework's own working point but an untracked sign, not a rounding matter. Parts (i) and (ii) are unchanged from K3-prime; their own checking records carry forward.","formal_status":"nl","load_bearing":true},"departure.k3-prime-idealization":{"id":"departure.k3-prime-idealization","kind":"comparison","label":"The framework's working idealization uses the flat-sliced Poincare background (P...","statement":"The framework's working idealization uses the flat-sliced Poincare background (Paper 0 eq. 2, K3-prime part (i)) throughout its derivations, exactly critical brane tension, an exact modulus z0. The physical background is dS-sliced (K3-prime part (ii)): supercritical effective tension locked to z0 via T_eff = (6/kappa5^2 L) coth(z0/L), the modulus tilted rather than exactly flat. The departure is quantitative and small at the framework's working point: relative deviation from critical of order (L/l_dS)^2, approximately 10^-64, per K3-prime part (ii). Residue: whether this tilt is negligible everywhere the framework relies on z0's flat-direction behavior, or whether it matters for a specific downstream mechanism, is not settled by K3-prime alone; carried by S-K3-KILL-REARG and S-K3-BACKREACT (landing-1 Track 4).","declared_grade":"corroborated","earned_grade":"corroborated","status":"in-force","presentation":{"type":"comparison","data":{}},"children":["k3-prime2","im.karch-randall-2001-tension-position"],"test":"The framework's working idealization uses the flat-sliced Poincare background (Paper 0 eq. 2, K3-prime part (i)) throughout its derivations, exactly critical brane tension, an exact modulus z0. The physical background is dS-sliced (K3-prime part (ii)): supercritical effective tension locked to z0 via T_eff = (6/kappa5^2 L) coth(z0/L), the modulus tilted rather than exactly flat. The departure is quantitative and small at the framework's working point: relative deviation from critical of order (L/l_dS)^2, approximately 10^-64, per K3-prime part (ii). Residue: whether this tilt is negligible everywhere the framework relies on z0's flat-direction behavior, or whether it matters for a specific downstream mechanism, is not settled by K3-prime alone; carried by S-K3-KILL-REARG and S-K3-BACKREACT (landing-1 Track 4).","state":"consistent"},"k4":{"id":"k4","kind":"transformation","label":"K4: The Framework is Purely Gravitational [from T2","statement":"K4: The Framework is Purely Gravitational [from T2.7 + T2.8]. Torsion enters through Einstein-Cartan gravity at coupling G/c^4 (hierarchy of 10^40 below electromagnetic). The conformal invariance of F^2 in 4D prevents any tree-level geometric channel from modifying electromagnetic couplings. The SO(1,4) Higgs is the gravitational Higgs, fully distinct from the electroweak Higgs. The framework cannot modify fermion masses, Bohr radii, or pycnonuclear screening through its own geometry. Clarificatory clause (tree-level vs one-loop): K4 prohibits direct tree-level couplings between the radion/torsion sector and the Standard Model gauge fields in the fundamental Lagrangian. It does not prohibit, and cannot prevent, loop-induced couplings arising from the quantum conformal trace anomaly. The heat kernel integration that derives the state-dependent coupling gamma (phi^A phi_A) f_Q necessarily generates terms proportional to beta(g) F_mu_nu F^mu_nu through the a_4(x) coefficient. These are manifestations of dimensional transmutation and constitute mathematically inevitable one-loop anomaly couplings rather than fundamental force modifications.","declared_grade":"corroborated","earned_grade":"corroborated","status":"in-force","presentation":{"type":"transformation","data":{}},"children":["t2.7","t2.8"],"role":"DG kind: derivation","takes":["t2.7","t2.8"],"produces":["k4"],"composition":"conjunction","function":"derive","math":"K4: The Framework is Purely Gravitational [from T2.7 + T2.8]. Torsion enters through Einstein-Cartan gravity at coupling G/c^4 (hierarchy of 10^40 below electromagnetic). The conformal invariance of F^2 in 4D prevents any tree-level geometric channel from modifying electromagnetic couplings. The SO(1,4) Higgs is the gravitational Higgs, fully distinct from the electroweak Higgs. The framework cannot modify fermion masses, Bohr radii, or pycnonuclear screening through its own geometry. Clarificatory clause (tree-level vs one-loop): K4 prohibits direct tree-level couplings between the radion/torsion sector and the Standard Model gauge fields in the fundamental Lagrangian. It does not prohibit, and cannot prevent, loop-induced couplings arising from the quantum conformal trace anomaly. The heat kernel integration that derives the state-dependent coupling gamma (phi^A phi_A) f_Q necessarily generates terms proportional to beta(g) F_mu_nu F^mu_nu through the a_4(x)
