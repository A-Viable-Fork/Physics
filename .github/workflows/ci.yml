name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: check-substrate
        run: node build/check-substrate.mjs
      - name: check-imports
        run: node build/check-imports.mjs
      - name: check-gate
        run: node build/check-gate.mjs
      - name: check-type-hash
        run: node build/check-type-hash.mjs
      - name: check-compute-invariants
        run: node build/check-compute-invariants.mjs
      - name: check-dg
        run: node build/check-dg.mjs
      - name: check-dg-tier1
        run: node build/check-dg-tier1.mjs
      - name: check-dg-coverage
        run: node build/check-dg-coverage.mjs
      - name: check-independence
        run: node build/check-independence.mjs
      - name: check-reservoir
        run: node build/check-reservoir.mjs
      - name: check-dg-staleness
        run: node build/check-dg-staleness.mjs
